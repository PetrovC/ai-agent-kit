# .codex/config.toml
# Project-level Codex configuration.
# Personal config (model, profiles, API keys) goes in ~/.codex/config.toml

# approval_policy controls when Codex asks for confirmation.
#   untrusted   — ask for any command that isn't pre-allowlisted (most paranoid)
#   on-request  — show proposed changes, require approval before applying (safe default)
#   never       — fully autonomous; no confirmations (CI / supervised runs only)
# (on-failure is deprecated; use on-request or never. A `granular` table also
#  exists for fine-grained control — see the Codex config reference.)
approval_policy = "on-request"

# sandbox_mode controls filesystem and network access during execution.
#   workspace-write    — read/write within the project directory; no network (recommended)
#   read-only          — no writes; useful for analysis / review tasks
#   danger-full-access — unrestricted (only for fully supervised runs)
sandbox_mode = "workspace-write"

# web_search enables Codex to fetch URLs for context.
#   cached   — results are cached to reduce latency and cost
#   enabled  — always fetch fresh
#   disabled — no web access
web_search = "cached"

# Cap per-doc size loaded into context to prevent runaway files (~32 KB ≈ 8k tokens).
project_doc_max_bytes = 32768

[sandbox_workspace_write]
network_access = false

# ── Environment policy ────────────────────────────────────────────────────────
# Controls which environment variables are exposed to subprocesses Codex spawns.
# This is the Codex equivalent of Gemini's advanced.excludedEnvVars and exists to
# keep secrets out of tool subprocesses. `inherit = "all"` keeps the dev workflow
# working (PATH etc.) while `exclude` scrubs common secret-bearing patterns.
[shell_environment_policy]
inherit = "all"
exclude = [
    "*_SECRET",
    "*_TOKEN",
    "*_KEY",
    "*_PASSWORD",
    "OPENAI_*",
    "ANTHROPIC_*",
    "AWS_*",
    "GCP_*",
]

# ── Session history ───────────────────────────────────────────────────────────
# Persist transcripts but cap the on-disk size so a long session can't fill the
# disk. Set persistence = "none" for sensitive repos that must not store history.
[history]
persistence = "save-all"
max_bytes = 10485760  # 10 MiB

# ── Completion notification (optional) ────────────────────────────────────────
# Uncomment to run a program when a turn finishes (parity with the Claude
# notify-done hook). The kit ships the hook form in .codex/hooks.json instead;
# this top-level `notify` is the config.toml alternative if you prefer it.
# notify = ["bash", ".codex/hooks/notify-done.sh"]

# ── MCP servers ───────────────────────────────────────────────────────────────
# Codex supports Model Context Protocol servers (stdio + HTTP). Uncomment and
# configure per project. This mirrors Claude's .mcp.json and Gemini's
# settings.json mcpServers. Docs: https://developers.openai.com/codex/mcp
#
# stdio (local process):
# [mcp_servers.github]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# env = { GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}" }
#
# [mcp_servers.filesystem]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "."]
#
# HTTP (remote):
# [mcp_servers.linear]
# url = "https://mcp.linear.app/sse"
# bearer_token_env_var = "LINEAR_API_KEY"
