# ~/.codex/config.toml
# ─────────────────────────────────────────────────────────────────────────────
# PERSONAL Codex configuration — copy this to ~/.codex/config.toml
# This is NOT committed to any repo. It holds your personal preferences.
# Project-level overrides go in <project>/.codex/config.toml
# ─────────────────────────────────────────────────────────────────────────────

# Current recommended Codex model is gpt-5.5 (fall back to gpt-5.4 if unavailable).
# See https://developers.openai.com/codex/models for the live list.
model                  = "gpt-5.5"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"

# Approval prompting:
#   untrusted   -> ask before anything not pre-allowlisted
#   on-request  -> ask when a tool requests escalation
#   never       -> do not ask; use only for supervised automation
#   granular    -> per-category prompting; useful to keep sandbox/MCP prompts
#                  interactive while failing request_permissions/skill scripts
#                  closed unless you explicitly opt into them.
approval_policy = "on-request"
# Pilot granular policy. Uncomment this line instead of the string value above.
# TOML inline tables must stay on one line.
# approval_policy = { granular = { sandbox_approval = true, rules = true, mcp_elicitations = true, request_permissions = false, skill_approval = false } }

sandbox_mode = "workspace-write" # workspace-write | read-only | danger-full-access

web_search       = "cached"
allow_login_shell = false
file_opener      = "vscode"

# ── Profiles ─────────────────────────────────────────────────────────────────
# Usage:
#   codex --profile readonly    → explore without risk
#   codex --profile standard    → normal daily work
#   codex --profile deep        → complex refactor / architecture
#   codex --profile review      → PR review, read-only

[profiles.readonly]
approval_policy        = "never"
sandbox_mode           = "read-only"
model_reasoning_effort = "low"
model_reasoning_summary = "concise"
web_search             = "disabled"

[profiles.standard]
approval_policy        = "on-request"
sandbox_mode           = "workspace-write"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
web_search             = "cached"

[profiles.deep]
approval_policy        = "on-request"
sandbox_mode           = "workspace-write"
model_reasoning_effort = "high"
model_reasoning_summary = "concise"
web_search             = "cached"

[profiles.review]
approval_policy        = "never"
sandbox_mode           = "read-only"
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
web_search             = "disabled"

# ── Sandbox options ───────────────────────────────────────────────────────────
[sandbox_workspace_write]
network_access = false

[windows]
sandbox = "elevated"
