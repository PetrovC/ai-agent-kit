description = "Update one package end-to-end. Args: <package> <old-version> <new-version>."

prompt = """
Update the package described by these arguments (package, old version, new version): {{args}}

Read skills/dependencies/SKILL.md first.

── Pre-update ────────────────────────────────────────────────────────────────
1. Read the changelog / release notes between the old and new version.
   Identify: breaking API changes, behaviour changes, deprecated patterns.
2. Verify the license is still MIT (or equivalent permissive). If it changed, stop and report.
3. Run the full test suite. Record the baseline (X passed, Y failed).

── Update ────────────────────────────────────────────────────────────────────
4. Change the version in the manifest (package.json / go.mod / .csproj / pyproject / Cargo.toml).
5. Fix compile/type errors from the update. Do not suppress with casts or `any`.
6. Adapt call sites to breaking API changes if needed.

── Post-update ───────────────────────────────────────────────────────────────
7. Run the full test suite. Compare to baseline.
8. Run the security audit (pnpm audit / govulncheck / dotnet list package --vulnerable / pip-audit / cargo audit).

── Report ────────────────────────────────────────────────────────────────────
- Package: name, old -> new.
- Breaking changes and how each was resolved.
- Test results before vs after.
- License confirmed.
- Security audit result.
- Follow-up items.
"""
