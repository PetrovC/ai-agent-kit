name: Release — checksums and signing

on:
  release:
    types: [published]

# Least privilege (#473): top-level read-only; the single job widens to the
# two scopes it actually needs.
permissions:
  contents: read

jobs:
  checksums:
    name: Generate SHA256SUMS and sign
    runs-on: ubuntu-latest
    permissions:
      contents: write   # softprops/action-gh-release uploads assets to the release
      id-token: write   # cosign keyless signing (OIDC token)
    steps:
      - name: Checkout at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Collect distributable assets
        run: |
          mkdir -p dist
          # Distributable kit content — no repo dogfood files
          # (.kit-manifest, .kit-version, .agents/, .claude/, .codex/, .agy/,
          #  docs/ai/ are repo-local install output and must NOT appear in releases)
          cp -r skills/           dist/skills
          cp -r tooling/          dist/tooling
          cp -r project-template/ dist/project-template
          cp -r prompts/          dist/prompts
          cp scripts/install.sh    scripts/install.ps1  \
             scripts/update.sh     scripts/update.ps1   \
             scripts/uninstall.sh  scripts/uninstall.ps1 \
             scripts/validate.sh   scripts/validate.ps1 \
             scripts/new-skill.sh  scripts/new-skill.ps1 \
             scripts/doctor.sh     scripts/doctor.ps1   \
             scripts/bootstrap.sh  scripts/bootstrap.ps1 \
             dist/
          cp VERSION README.md LICENSE SECURITY.md CHANGELOG.md dist/

      - name: Package release archive
        run: |
          TAG="${{ github.event.release.tag_name }}"
          tar -czf "ai-agent-kit-${TAG}.tar.gz" -C dist .
          cd dist && zip -r "../ai-agent-kit-${TAG}.zip" . && cd ..

      - name: Generate SHA256SUMS
        run: |
          find dist -type f | sort | xargs sha256sum > SHA256SUMS
          sha256sum "ai-agent-kit-${{ github.event.release.tag_name }}.tar.gz" \
                    "ai-agent-kit-${{ github.event.release.tag_name }}.zip" >> SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # sigstore/cosign-installer@v4.1.2

      - name: Sign artifacts with cosign (keyless)
        run: |
          TAG="${{ github.event.release.tag_name }}"
          cosign sign-blob --yes SHA256SUMS \
            --bundle SHA256SUMS.bundle
          # Per-archive sigstore bundles so each download is independently
          # verifiable (and Scorecard Signed-Releases sees signatures) (#472)
          cosign sign-blob --yes "ai-agent-kit-${TAG}.tar.gz" \
            --bundle "ai-agent-kit-${TAG}.tar.gz.sigstore.json"
          cosign sign-blob --yes "ai-agent-kit-${TAG}.zip" \
            --bundle "ai-agent-kit-${TAG}.zip.sigstore.json"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # softprops/action-gh-release@v3
        with:
          # v1.22.0/v1.22.1 ended up with zero assets while this step reported
          # success; fail loudly if any listed file is missing (#472)
          fail_on_unmatched_files: true
          files: |
            ai-agent-kit-${{ github.event.release.tag_name }}.tar.gz
            ai-agent-kit-${{ github.event.release.tag_name }}.zip
            ai-agent-kit-${{ github.event.release.tag_name }}.tar.gz.sigstore.json
            ai-agent-kit-${{ github.event.release.tag_name }}.zip.sigstore.json
            dist/bootstrap.sh
            dist/bootstrap.ps1
            SHA256SUMS
            SHA256SUMS.bundle
