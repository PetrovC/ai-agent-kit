name: Agent on mention (@claude)

# Lets a maintainer summon Claude on an issue or PR by commenting `@claude ...`.
# Required secrets:
#   CLAUDE_CODE_OAUTH_TOKEN - auth via your Claude Pro/Max subscription (NOT the
#                             paid API). Generate locally with `claude setup-token`.
#                             (Alternative: set ANTHROPIC_API_KEY for API billing
#                             and swap the input below to anthropic_api_key.)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Least privilege for what the agent may need to do on the thing it was summoned on.
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: agent-mention-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Gate: only an explicit @claude mention, and only from a maintainer. On a
    # public repo, comment-triggered jobs run with secrets, so this gate is the
    # security boundary — do not loosen it.
    if: >-
      contains(github.event.comment.body, '@claude') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude
        uses: anthropics/claude-code-action@0170fdd543ea09e8d47e76eeb1f3f2b1c2d66173 # anthropics/claude-code-action@v1
        with:
          # Uses your Claude Pro/Max subscription, not the paid API.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
