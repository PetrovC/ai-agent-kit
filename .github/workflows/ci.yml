name: CI

on:
  push:
    branches: [master, "audit/**", "feat/**", "fix/**"]
  pull_request:

jobs:
  no-install-output-tracked:
    name: Kit must not commit its own install output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No install-output artifact may be tracked at the repo root
        run: |
          # The kit's SOURCE lives in tooling/, skills/, scripts/, etc.
          # These root paths are what the installer writes into a *target*
          # project — committing them into the kit itself is the "dogfood
          # pollution" failure mode. .gitignore guards against accidental
          # `git add`; this CI check enforces it.
          bad=0
          for p in AGENTS.md CLAUDE.md GEMINI.md .geminiignore .mcp.json \
                   .mcp.example.jsonc .kit-version CLAUDE.local.md \
                   .codex .gemini .agents docs/ai; do
            if git ls-files --error-unmatch "$p" >/dev/null 2>&1; then
              echo "TRACKED INSTALL OUTPUT AT ROOT: $p"
              bad=1
            fi
            # also catch a tracked directory's contents
            if git ls-files "$p/" 2>/dev/null | grep -q .; then
              echo "TRACKED INSTALL OUTPUT DIR AT ROOT: $p/"
              bad=1
            fi
          done
          [[ "$bad" -eq 0 ]] || { echo "Kit must ship source, not install output."; exit 1; }
          echo "OK: no install-output artifact tracked at root"

  validate-example:
    name: Validate filled example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate examples/filled-project
        run: bash scripts/validate.sh --target examples/filled-project

  smoke-install:
    name: Smoke install (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kit into temp project
        run: |
          mkdir -p /tmp/smoke-target
          bash scripts/install.sh --target /tmp/smoke-target --tools codex,claude,gemini

      - name: Verify expected files exist
        run: |
          files=(
            "/tmp/smoke-target/AGENTS.md"
            "/tmp/smoke-target/CLAUDE.md"
            "/tmp/smoke-target/GEMINI.md"
            "/tmp/smoke-target/.kit-version"
            "/tmp/smoke-target/.mcp.json"
            "/tmp/smoke-target/.mcp.example.jsonc"
            "/tmp/smoke-target/.claude/settings.json"
            "/tmp/smoke-target/.claude/hooks/format-on-save.sh"
            "/tmp/smoke-target/.claude/hooks/pre-bash-guard.sh"
            "/tmp/smoke-target/.claude/hooks/notify-done.sh"
            "/tmp/smoke-target/.claude/hooks/session-summary.sh"
            "/tmp/smoke-target/.claude/rules/commit-style.md"
            "/tmp/smoke-target/.claude/rules/test-naming.md"
            "/tmp/smoke-target/.claude/rules/migration-safety.md"
            "/tmp/smoke-target/.claude/rules/env-safety.md"
            "/tmp/smoke-target/.claude/commands/bug-fix.md"
            "/tmp/smoke-target/.claude/commands/code-review.md"
            "/tmp/smoke-target/.claude/commands/feature-planning.md"
            "/tmp/smoke-target/.codex/config.toml"
            "/tmp/smoke-target/.codex/hooks.json"
            "/tmp/smoke-target/.codex/hooks/pre-bash-guard.sh"
            "/tmp/smoke-target/.codex/hooks/format-on-save.sh"
            "/tmp/smoke-target/.codex/hooks/notify-done.sh"
            "/tmp/smoke-target/.agents/skills/architect/SKILL.md"
            "/tmp/smoke-target/.agents/skills/security-reviewer/SKILL.md"
            "/tmp/smoke-target/.gemini/commands/bug-fix.toml"
            "/tmp/smoke-target/.gemini/commands/security-audit.toml"
            "/tmp/smoke-target/docs/ai/PROJECT.md"
          )
          for f in "${files[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Verify hook scripts are executable
        run: |
          for f in /tmp/smoke-target/.claude/hooks/*.sh /tmp/smoke-target/.codex/hooks/*.sh; do
            if [[ ! -x "$f" ]]; then
              echo "NOT EXECUTABLE: $f"
              exit 1
            fi
            echo "EXECUTABLE: $f"
          done

      - name: Dry-run update (no changes expected)
        run: bash scripts/update.sh --target /tmp/smoke-target --dry-run

      - name: Dry-run uninstall
        run: bash scripts/uninstall.sh --target /tmp/smoke-target --dry-run

  smoke-install-windows:
    name: Smoke install (PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kit into temp project
        shell: pwsh
        run: |
          $target = "$env:RUNNER_TEMP\smoke-target"
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          .\scripts\install.ps1 -Target $target -Tools "codex,claude,gemini"

      - name: Verify expected files exist
        shell: pwsh
        run: |
          $target = "$env:RUNNER_TEMP\smoke-target"
          $files = @(
            "AGENTS.md", "CLAUDE.md", "GEMINI.md", ".kit-version", ".mcp.json", ".mcp.example.jsonc",
            ".claude\settings.json",
            ".claude\hooks\format-on-save.sh", ".claude\hooks\pre-bash-guard.sh",
            ".claude\hooks\notify-done.sh", ".claude\hooks\session-summary.sh",
            ".claude\rules\commit-style.md", ".claude\rules\test-naming.md",
            ".claude\rules\migration-safety.md", ".claude\rules\env-safety.md",
            ".claude\commands\bug-fix.md", ".claude\commands\code-review.md",
            ".claude\commands\feature-planning.md",
            ".codex\config.toml", ".codex\hooks.json",
            ".codex\hooks\pre-bash-guard.sh", ".codex\hooks\format-on-save.sh", ".codex\hooks\notify-done.sh",
            ".agents\skills\architect\SKILL.md", ".agents\skills\security-reviewer\SKILL.md",
            ".gemini\commands\bug-fix.toml", ".gemini\commands\security-audit.toml",
            "docs\ai\PROJECT.md"
          )
          $missing = $false
          foreach ($f in $files) {
            $path = Join-Path $target $f
            if (Test-Path $path) { Write-Host "OK: $f" }
            else { Write-Host "MISSING: $f"; $missing = $true }
          }
          if ($missing) { exit 1 }

      - name: Dry-run update
        shell: pwsh
        run: .\scripts\update.ps1 -Target "$env:RUNNER_TEMP\smoke-target" -DryRun

      - name: Dry-run uninstall
        shell: pwsh
        run: .\scripts\uninstall.ps1 -Target "$env:RUNNER_TEMP\smoke-target" -DryRun

  lint-skills:
    name: Skill structure check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Every skill must have a SKILL.md
        run: |
          errors=0
          for dir in skills/*/; do
            if [[ ! -f "${dir}SKILL.md" ]]; then
              echo "MISSING SKILL.md in: $dir"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Every SKILL.md must have a Final response requirements section
        run: |
          errors=0
          for f in skills/*/SKILL.md; do
            if ! grep -q "Final response requirements" "$f"; then
              echo "MISSING 'Final response requirements' in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

  lint-rules:
    name: Rules structure check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Every rule file must have a paths frontmatter key
        run: |
          errors=0
          for f in tooling/claude/rules/*.md; do
            if ! grep -q "^paths:" "$f"; then
              echo "MISSING 'paths:' frontmatter in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Claude settings.json must declare $schema and no invalid outputStyle
        run: |
          python3 - <<'PY'
          import json, sys
          s = json.load(open("tooling/claude/settings.json"))
          errs = []
          if s.get("$schema") != "https://json.schemastore.org/claude-code-settings.json":
              errs.append("settings.json missing/!official $schema")
          # "default" is not a documented outputStyle value; absence = default behaviour.
          if s.get("outputStyle") == "default":
              errs.append('settings.json outputStyle:"default" is not a valid value (remove the key)')
          if errs:
              print("\n".join(errs)); sys.exit(1)
          print("OK: settings.json schema + outputStyle valid")
          PY

      - name: Subagent tools must use the documented comma-string form
        run: |
          errors=0
          for f in tooling/claude/agents/*.md; do
            # Official subagent .md frontmatter documents `tools: A, B, C`
            # (comma-separated string), not a YAML list under `tools:`.
            if grep -qE '^tools:[[:space:]]*$' "$f"; then
              echo "YAML-list tools: in $f (use 'tools: A, B, C' string form)"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Verify hook scripts exist and are executable
        run: |
          errors=0
          for f in tooling/claude/hooks/*.sh tooling/codex/hooks/*.sh; do
            if [[ ! -x "$f" ]]; then
              echo "NOT EXECUTABLE: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: pre-bash-guard blocks destructive commands and allows safe ones
        shell: bash
        run: |
          fail=0
          run_matrix() { # <guard-path>
            local g="$1"
            echo "── matrix against $g ──"
            expect() { # <expected-exit> <label> <json>
              local got=0
              # The guard exits 2 when it blocks. Capture that without letting
              # `set -e` abort the step (|| keeps the exit status handled).
              echo "$3" | bash "$g" >/dev/null 2>&1 || got=$?
              if [[ "$got" -ne "$1" ]]; then
                echo "FAIL ($got != $1): $2"
                fail=1
              else
                echo "ok: $2"
              fi
            }
            expect 2 "force-push"        '{"tool_input":{"command":"git push --force origin main"}}'
            expect 2 "force-push -f"     '{"tool_input":{"command":"git push -f origin main"}}'
            expect 2 "force-with-lease"  '{"tool_input":{"command":"git push --force-with-lease origin main"}}'
            expect 2 "reset --hard"      '{"tool_input":{"command":"git reset --hard HEAD~3"}}'
            expect 2 "rm -rf /etc"       '{"tool_input":{"command":"rm -rf /etc"}}'
            expect 2 "rm -rf parent"     '{"tool_input":{"command":"rm -rf ../../etc"}}'
            expect 2 "rm -rf home"       '{"tool_input":{"command":"rm -rf ~"}}'
            expect 2 "rm -rf cwd"        '{"tool_input":{"command":"rm -rf ."}}'
            expect 2 "rm -rf cwd slash"  '{"tool_input":{"command":"rm -rf ./"}}'
            expect 2 "rm -rf glob"       '{"tool_input":{"command":"rm -rf *"}}'
            expect 2 "rm -Rf cwd"        '{"tool_input":{"command":"rm -Rf ."}}'
            expect 2 "rm long-flags cwd" '{"tool_input":{"command":"rm --recursive --force ."}}'
            expect 2 "DROP TABLE"        '{"tool_input":{"command":"psql -c \"DROP TABLE users\""}}'
            expect 0 "git status"        '{"tool_input":{"command":"git status"}}'
            expect 0 "push branch -f"    '{"tool_input":{"command":"git push origin feature-foo"}}'
            expect 0 "rm -rf /tmp/x"     '{"tool_input":{"command":"rm -rf /tmp/x"}}'
            expect 0 "rm -rf local dir"  '{"tool_input":{"command":"rm -rf node_modules"}}'
            expect 0 "rm -rf subdir"     '{"tool_input":{"command":"rm -rf ./build"}}'
            expect 0 "npm test"          '{"tool_input":{"command":"npm test"}}'
          }
          run_matrix tooling/claude/hooks/pre-bash-guard.sh
          run_matrix tooling/codex/hooks/pre-bash-guard.sh
          [[ "$fail" -eq 0 ]] || exit 1

  lint-yaml:
    name: YAML syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: sudo snap install yq

      - name: Validate every YAML file parses
        run: |
          errors=0
          while IFS= read -r f; do
            if ! yq eval '.' "$f" > /dev/null 2>&1; then
              echo "INVALID YAML: $f"
              yq eval '.' "$f" 2>&1 | head -5
              errors=$((errors+1))
            else
              echo "OK: $f"
            fi
          done < <(find . -type f \( -name "*.yml" -o -name "*.yaml" \) -not -path "./node_modules/*" -not -path "./.git/*")
          [[ "$errors" -eq 0 ]] || exit 1

      - name: GitHub Actions workflow templates must declare 'on' and 'jobs'
        run: |
          errors=0
          for f in prompts/github-actions/*.yml .github/workflows/*.yml; do
            [[ -f "$f" ]] || continue
            if ! yq eval 'has("on") and has("jobs")' "$f" | grep -q "^true$"; then
              echo "MISSING 'on' or 'jobs' in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

  routing-consistency:
    name: Skill routing consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Every skill must appear in all three routing tables
        run: |
          errors=0
          for dir in skills/*/; do
            skill=$(basename "$dir")
            # Claude — `<skill>` skill
            if ! grep -qE "\`${skill}\`[[:space:]]+skill" tooling/claude/CLAUDE.md; then
              echo "MISSING from tooling/claude/CLAUDE.md: $skill"
              errors=$((errors+1))
            fi
            # Codex — `$<skill>` (fixed-string match avoids regex back-reference parsing)
            codex_pattern="\`\$${skill}\`"
            if ! grep -qF "$codex_pattern" tooling/codex/AGENTS.md; then
              echo "MISSING from tooling/codex/AGENTS.md: \$$skill"
              errors=$((errors+1))
            fi
            # Gemini — must reference the INSTALLED path .gemini/skills/<skill>/SKILL.md
            # (install copies skills there; a bare skills/ path is broken in the target).
            if ! grep -qE "\.gemini/skills/${skill}/SKILL\.md" tooling/gemini/GEMINI.md; then
              echo "MISSING/!.gemini-path from tooling/gemini/GEMINI.md: .gemini/skills/$skill/SKILL.md"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

  lint-workflow-semantics:
    name: GitHub Actions workflow semantics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Workflow templates must be semantically correct
        run: |
          python3 - <<'PY'
          import glob, re, sys
          errs = []
          GH = "prompts/github-actions"

          def read(p): return open(p, encoding="utf-8").read()

          # 1. codex-action safety-strategy must be a valid value.
          valid_ss = {"drop-sudo", "unprivileged-user", "read-only", "unsafe"}
          for f in glob.glob(f"{GH}/*.yml"):
              for m in re.finditer(r'safety-strategy:\s*"?([a-z-]+)"?', read(f)):
                  if m.group(1) not in valid_ss:
                      errs.append(f"{f}: invalid safety-strategy '{m.group(1)}' (valid: {sorted(valid_ss)})")

          # 2. Any workflow that triggers on pull_request_review_comment must NOT
          #    gate solely on github.event.issue.pull_request (doesn't exist there).
          for f in glob.glob(f"{GH}/*.yml"):
              t = read(f)
              if "pull_request_review_comment:" in t and "github.event.issue.pull_request" in t:
                  if "github.event_name == 'pull_request_review_comment'" not in t:
                      errs.append(f"{f}: uses github.event.issue.pull_request but also triggers on "
                                  "pull_request_review_comment without an event_name split")

          # 3. codex-pr-review must post the final-message (codex-action doesn't auto-comment).
          cpr = f"{GH}/codex-pr-review.yml"
          t = read(cpr)
          if "final-message" not in t or "github-script" not in t:
              errs.append(f"{cpr}: missing a step that posts steps.*.outputs.final-message")

          # 4. Comment-triggered agent workflows must filter by author_association.
          for f in glob.glob(f"{GH}/*.yml"):
              t = read(f)
              if "issue_comment:" in t or "pull_request_review_comment:" in t:
                  if "author_association" not in t:
                      errs.append(f"{f}: comment-triggered but no author_association filter")

          if errs:
              print("\n".join(errs)); sys.exit(1)
          print("OK: workflow semantics valid")
          PY

  lint-codex-hooks:
    name: Codex hooks resolve from git root
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: hooks.json commands must not use fragile relative paths
        run: |
          python3 - <<'PY'
          import json, sys
          h = json.load(open("tooling/codex/hooks.json"))
          errs = []
          for event, groups in h.get("hooks", {}).items():
              for g in groups:
                  for hk in g.get("hooks", []):
                      cmd = hk.get("command", "")
                      if cmd.startswith(".codex/"):
                          errs.append(f"{event}: bare relative command '{cmd}' "
                                      "(must resolve from git root)")
                      elif "git rev-parse --show-toplevel" not in cmd:
                          errs.append(f"{event}: command does not resolve from git root: {cmd!r}")
          if errs:
              print("\n".join(errs)); sys.exit(1)
          print("OK: codex hooks resolve from git root")
          PY

      - name: README hooks section must not contradict Codex hook support
        run: |
          if grep -q "Codex and Gemini have no equivalent hook system" README.md; then
            echo "README still claims Codex has no hooks (contradicts the Hooks section)"
            exit 1
          fi
          echo "OK: README hooks coherent"

  lint-plugin-manifest:
    name: Claude plugin + marketplace manifests valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: plugin.json and marketplace.json must be valid and consistent
        run: |
          python3 - <<'PY'
          import json, re, sys
          errs = []

          with open(".claude-plugin/plugin.json") as f:
              p = json.load(f)
          for k in ("name", "version", "description"):
              if not p.get(k):
                  errs.append(f"plugin.json missing '{k}'")

          with open(".claude-plugin/marketplace.json") as f:
              m = json.load(f)
          if not m.get("name"):
              errs.append("marketplace.json missing 'name'")
          if not m.get("owner", {}).get("name"):
              errs.append("marketplace.json missing 'owner.name'")
          plugins = m.get("plugins") or []
          if not plugins:
              errs.append("marketplace.json has no plugins")
          for pl in plugins:
              if not pl.get("name") or not pl.get("source"):
                  errs.append(f"marketplace plugin entry missing name/source: {pl}")

          # plugin.json AND gemini-extension.json versions must match the kit
          # version in install.sh, so every distribution path stays on the same
          # release (this catches the v1.16.0 gemini-extension.json drift).
          with open("scripts/install.sh") as f:
              txt = f.read()
          mt = re.search(r'KIT_VERSION="([^"]+)"', txt)
          kit_ver = mt.group(1) if mt else None
          if kit_ver != p.get("version"):
              errs.append(f"plugin.json version ({p.get('version')}) != KIT_VERSION ({kit_ver})")

          with open("tooling/gemini/gemini-extension.json") as f:
              ext = json.load(f)
          if kit_ver != ext.get("version"):
              errs.append(f"gemini-extension.json version ({ext.get('version')}) != KIT_VERSION ({kit_ver})")

          # marketplace plugin source must be a documented form: a relative
          # path starting with "./", or a {source: github|url|...} object.
          self_repo = (p.get("repository") or "").replace("https://github.com/", "").rstrip("/")
          for pl in plugins:
              src = pl.get("source")
              ok = (isinstance(src, str) and src.startswith("./")) or (
                  isinstance(src, dict) and src.get("source") in ("github", "url", "git-subdir", "npm")
              )
              if not ok:
                  errs.append(f"marketplace source not a documented form: {src!r}")
              # Same-repo plugins MUST use the relative "./..." form. A
              # {source:github, repo:<own repo>} self-reference forces a second
              # fetch that breaks on PRIVATE repos (the marketplace clone is
              # already authenticated; the plugin re-fetch may not be).
              if isinstance(src, dict) and src.get("source") == "github" \
                 and src.get("repo", "").rstrip("/") == self_repo and self_repo:
                  errs.append(
                      f"plugin source github:{src.get('repo')} self-references the "
                      f"marketplace repo — use a relative \"./\" source instead "
                      f"(private-repo safe, no second fetch)")

          if errs:
              print("\n".join(errs)); sys.exit(1)
          print(f"OK: manifests valid + version-consistent ({kit_ver})")
          PY

  lint-mcp-json-strict:
    name: .mcp.json must be strict JSON (no comments)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tooling/claude/.mcp.json must parse as strict JSON
        run: |
          # Claude Code rejects JSONC. The reference-with-comments lives in
          # .mcp.example.jsonc; the installed .mcp.json must be strict JSON.
          if ! python3 -c "import json,sys; json.load(open('tooling/claude/.mcp.json'))"; then
            echo "tooling/claude/.mcp.json is not strict JSON"
            exit 1
          fi
          if grep -qE '^\s*//' tooling/claude/.mcp.json; then
            echo "tooling/claude/.mcp.json contains // comments — must be strict JSON"
            exit 1
          fi
          echo "OK: .mcp.json is strict JSON"

  lint-codex-approval-policy:
    name: Codex approval_policy values must be valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Each approval_policy line must use a value the Rust CLI accepts
        run: |
          errors=0
          # Valid values per https://developers.openai.com/codex/config-reference
          # on-failure is deprecated -> rejected here so the kit can't regress.
          while IFS= read -r line; do
            value=$(echo "$line" | sed -E 's/.*approval_policy[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
            case "$value" in
              untrusted|on-request|never) ;;
              on-failure)
                echo "DEPRECATED approval_policy value: on-failure (use on-request or never)"
                errors=$((errors+1))
                ;;
              *)
                echo "INVALID approval_policy value: $value"
                errors=$((errors+1))
                ;;
            esac
          done < <(grep -hE '^[[:space:]]*approval_policy[[:space:]]*=' tooling/codex/*.toml)
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Codex .toml files must parse
        run: |
          # Ubuntu runners ship Python 3.11+ which has tomllib in the stdlib.
          errors=0
          for f in tooling/codex/*.toml; do
            if ! python3 -c "import tomllib,sys; tomllib.load(open('$f','rb'))"; then
              echo "INVALID TOML: $f"
              errors=$((errors+1))
            else
              echo "OK: $f"
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: config.toml must not document the invalid web_search value
        run: |
          # Valid web_search string values are: disabled | cached | live.
          # "enabled" is NOT a Codex value (common mistake). Guard the comment
          # so a user copying it can't set an invalid config.
          if grep -qiE 'web.search|^#.*enabled.*always fetch' tooling/codex/config.toml \
             && grep -qE '^#[[:space:]]*enabled[[:space:]]' tooling/codex/config.toml; then
            echo "config.toml documents 'enabled' for web_search; valid value is 'live'"
            exit 1
          fi
          echo "OK: web_search documentation uses valid values"

  lint-codex-skills:
    name: Codex skills must follow SKILL.md format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Each Codex subagent skill must have name + description frontmatter
        run: |
          errors=0
          for f in tooling/codex/skills/*/SKILL.md; do
            if [[ ! -f "$f" ]]; then continue; fi
            if ! grep -qE '^name:[[:space:]]' "$f"; then
              echo "MISSING 'name:' frontmatter in: $f"
              errors=$((errors+1))
            fi
            if ! grep -qE '^description:' "$f"; then
              echo "MISSING 'description:' frontmatter in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: No leftover .codex/agents/*.toml files should be tracked
        run: |
          if [[ -d "tooling/codex/agents" ]]; then
            echo "Legacy directory tooling/codex/agents/ should be removed (replaced by tooling/codex/skills/)"
            exit 1
          fi

  lint-claude-commands:
    name: Claude slash commands must have description frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Each .claude/commands/*.md must declare a description
        run: |
          errors=0
          for f in tooling/claude/commands/*.md; do
            if [[ ! -f "$f" ]]; then continue; fi
            if ! grep -qE '^description:' "$f"; then
              echo "MISSING 'description:' frontmatter in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

  lint-gemini-subagents:
    name: Gemini subagents must follow .gemini/agents/*.md format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Each Gemini subagent must have name + description frontmatter
        run: |
          errors=0
          for f in tooling/gemini/agents/*.md; do
            if [[ ! -f "$f" ]]; then continue; fi
            if ! grep -qE '^name:[[:space:]]' "$f"; then
              echo "MISSING 'name:' frontmatter in: $f"
              errors=$((errors+1))
            fi
            if ! grep -qE '^description:' "$f"; then
              echo "MISSING 'description:' frontmatter in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Each Gemini command .toml must declare prompt + description
        run: |
          errors=0
          for f in tooling/gemini/commands/*.toml; do
            if [[ ! -f "$f" ]]; then continue; fi
            if ! grep -qE '^prompt[[:space:]]*=' "$f"; then
              echo "MISSING 'prompt =' in: $f"
              errors=$((errors+1))
            fi
            if ! grep -qE '^description[[:space:]]*=' "$f"; then
              echo "MISSING 'description =' in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Gemini command .toml files must parse
        run: |
          errors=0
          for f in tooling/gemini/commands/*.toml; do
            if ! python3 -c "import tomllib,sys; tomllib.load(open('$f','rb'))"; then
              echo "INVALID TOML: $f"
              errors=$((errors+1))
            else
              echo "OK: $f"
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: gemini-extension.json must be valid JSON with name + version
        run: |
          python3 -c "import json; d=json.load(open('tooling/gemini/gemini-extension.json')); assert d.get('name') and d.get('version'), 'name/version required'"
          echo "OK: gemini-extension.json"

  verify-webfetch-domains:
    name: Claude WebFetch domain sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: WebFetch entries must be domain-scoped HTTPS, not wildcards or schemes
        run: |
          errors=0
          # Extract WebFetch(domain:...) entries; verify each domain is a plausible hostname.
          domains=$(jq -r '.permissions.allow[] | select(startswith("WebFetch(domain:"))' tooling/claude/settings.json \
                    | sed -E 's/^WebFetch\(domain:([^)]+)\)$/\1/')
          while IFS= read -r d; do
            [[ -z "$d" ]] && continue
            if [[ "$d" == "*" || "$d" == *"*"* ]]; then
              echo "WILDCARD DOMAIN (too broad): $d"
              errors=$((errors+1))
            elif [[ "$d" == http://* || "$d" == https://* ]]; then
              echo "DOMAIN SHOULD NOT INCLUDE SCHEME: $d"
              errors=$((errors+1))
            elif [[ ! "$d" =~ ^[a-zA-Z0-9]([a-zA-Z0-9.-]*[a-zA-Z0-9])?$ ]]; then
              echo "INVALID DOMAIN FORMAT: $d"
              errors=$((errors+1))
            else
              echo "OK: $d"
            fi
          done <<< "$domains"
          [[ "$errors" -eq 0 ]] || exit 1
