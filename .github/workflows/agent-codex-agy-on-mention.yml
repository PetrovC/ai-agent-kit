name: Agent on mention (@codex / @agy)

# Lets a maintainer summon Codex or Antigravity on an issue (or a PR
# conversation comment) by commenting `@codex ...` or `@agy ...`. Neither
# provider has an official GitHub Action, so each job is bespoke: it installs the
# provider CLI, runs it non-interactively on the comment, and posts the result
# back. Sibling of agent-on-mention.yml (@claude).
#
# Security model (do not loosen):
#   - Maintainer-gated: the `if:` requires an OWNER/MEMBER/COLLABORATOR author.
#     On a public repo, comment-triggered jobs run with secrets, so this gate is
#     the boundary.
#   - GitHub forbids the `secrets` context in `if:` ("workflow file issue"), so
#     key presence is checked inside the script via env, not in the `if:`.
#   - The untrusted comment body is passed via `env:` and only ever used as a
#     single quoted CLI argument — never interpolated into a shell command (that
#     would be a shell-injection sink).
#
# Governance audit: each run emits the governance loop (run.started →
# task.classified → agent.selected/invoked/completed → run.completed) via the
# kit's emit-event wrapper and finalizes it, so CI summons populate the rich
# audit exactly like a local session (see docs/ai/SUBAGENT_GOVERNANCE.md →
# "Governance in CI"). All audit calls are best-effort and fail-open: with no
# AAK_AUDIT_DEPLOY_KEY they no-op and never affect the agent's reply.
#
# Required secrets (add these in repo settings → Secrets and variables → Actions):
#   OPENAI_API_KEY        - Codex CLI auth (for @codex).
#   GEMINI_API_KEY        - Antigravity CLI auth (for @agy).
#   AAK_AUDIT_DEPLOY_KEY  - optional; SSH deploy key for the private audit repo.
#                           Omit to skip cloud audit capture (everything else runs).
#
# The CLI install commands below are the expected package names; adjust them to
# whatever your environment uses. Each job degrades gracefully (posts a helpful
# comment and exits 0) when the key is missing or the CLI does not install, so a
# misconfigured secret never shows up as a red ✗ on the thread.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: agent-codex-agy-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  codex:
    if: >-
      contains(github.event.comment.body, '@codex') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Provision audit (optional)
        env:
          AAK_AUDIT_DEPLOY_KEY: ${{ secrets.AAK_AUDIT_DEPLOY_KEY }}
        run: bash .github/scripts/provision-audit.sh

      - name: Install Codex CLI (best-effort)
        run: npm install -g @openai/codex || true

      - name: Run Codex on the mention (governance-audited)
        env:
          # Untrusted input and the secret are kept out of `if:` and out of the
          # command line — referenced only as quoted shell variables below.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            gh issue comment "$ISSUE_NUMBER" --body \
              "🤖 @codex run skipped: \`OPENAI_API_KEY\` is not configured in repo secrets."
            exit 0
          fi
          if ! command -v codex >/dev/null 2>&1; then
            gh issue comment "$ISSUE_NUMBER" --body \
              "🤖 @codex run skipped: the Codex CLI did not install (adjust the install step's package name)."
            exit 0
          fi

          # Strip everything up to and including the first @codex mention; the
          # remainder is the prompt. COMMENT_BODY is untrusted, so it is only
          # ever a quoted argument to `codex exec`, never eval'd by the shell.
          prompt="${COMMENT_BODY#*@codex}"
          prompt="$(printf '%s' "$prompt" | sed 's/^[[:space:]]*//')"
          [ -n "$prompt" ] || prompt="Summarize this issue and suggest next steps."

          # Governance loop (best-effort, fail-open): emit the lifecycle events
          # so this CI run populates the rich audit like a local session. emit()
          # uses the kit wrapper and the config from the provisioning step; with
          # no deploy-key secret every call no-ops via `|| true`.
          export AAK_AUDIT_RUN_ID="run_ci_codex_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          emit() { bash tooling/shared/agent-audit/emit-event.sh --source-root "$GITHUB_WORKSPACE" "$@" >/dev/null 2>&1 || true; }
          emit --type run.started --actor ci
          emit --type task.classified --actor ci --payload '{"task_type":"ci_agent_mention","risk_level":"low","complexity":"small"}'
          emit --type agent.selected --actor ci --invocation-id inv_codex --payload '{"provider":"codex","agent_category":"delegated","agent_key":"codex","model_tier":"standard"}'
          emit --type agent.invoked --actor ci --invocation-id inv_codex --payload '{"provider":"codex"}'

          # Non-interactive, read-only sandbox. Capture the real status without
          # failing the job (the `if` swallows the exit under `set -e`).
          if out="$(codex exec --json -s read-only "$prompt" 2>&1)"; then status=success; else status=error; fi

          emit --type agent.completed --actor ci --invocation-id inv_codex --payload "{\"provider\":\"codex\",\"status\":\"$status\"}"

          {
            echo "### 🤖 Codex"
            echo
            echo '```'
            printf '%s\n' "$out" | tail -c 60000
            echo '```'
          } > "$RUNNER_TEMP/codex-reply.md"
          gh issue comment "$ISSUE_NUMBER" --body-file "$RUNNER_TEMP/codex-reply.md"

          emit --type run.completed --actor ci --payload '{"project_hash":"ci_aak_codex_mention","status":"completed","validation_state":"unavailable","observed_model_tier":"standard"}'
          bash tooling/shared/agent-audit/finalize-run.sh --source-root "$GITHUB_WORKSPACE" --run-id "$AAK_AUDIT_RUN_ID" >/dev/null 2>&1 || true

  agy:
    if: >-
      contains(github.event.comment.body, '@agy') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Provision audit (optional)
        env:
          AAK_AUDIT_DEPLOY_KEY: ${{ secrets.AAK_AUDIT_DEPLOY_KEY }}
        run: bash .github/scripts/provision-audit.sh

      - name: Install Antigravity CLI (best-effort)
        # Expected package name; adjust to whatever distributes the `agy` CLI.
        run: npm install -g @antigravity/agy || true

      - name: Run Antigravity on the mention (governance-audited)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          if [ -z "${GEMINI_API_KEY:-}" ]; then
            gh issue comment "$ISSUE_NUMBER" --body \
              "🤖 @agy run skipped: \`GEMINI_API_KEY\` is not configured in repo secrets."
            exit 0
          fi
          if ! command -v agy >/dev/null 2>&1; then
            gh issue comment "$ISSUE_NUMBER" --body \
              "🤖 @agy run skipped: the Antigravity CLI did not install (adjust the install step's package name)."
            exit 0
          fi

          prompt="${COMMENT_BODY#*@agy}"
          prompt="$(printf '%s' "$prompt" | sed 's/^[[:space:]]*//')"
          [ -n "$prompt" ] || prompt="Summarize this issue and suggest next steps."

          # Governance loop (best-effort, fail-open) — see the codex job for the
          # rationale; the model tier here is the Antigravity Pro/Flash routing.
          export AAK_AUDIT_RUN_ID="run_ci_agy_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          emit() { bash tooling/shared/agent-audit/emit-event.sh --source-root "$GITHUB_WORKSPACE" "$@" >/dev/null 2>&1 || true; }
          emit --type run.started --actor ci
          emit --type task.classified --actor ci --payload '{"task_type":"ci_agent_mention","risk_level":"low","complexity":"small"}'
          emit --type agent.selected --actor ci --invocation-id inv_agy --payload '{"provider":"antigravity","agent_category":"delegated","agent_key":"antigravity","model_tier":"standard"}'
          emit --type agent.invoked --actor ci --invocation-id inv_agy --payload '{"provider":"antigravity"}'

          if out="$(agy -p "$prompt" --output-format json --dangerously-skip-permissions 2>&1)"; then status=success; else status=error; fi

          emit --type agent.completed --actor ci --invocation-id inv_agy --payload "{\"provider\":\"antigravity\",\"status\":\"$status\"}"

          {
            echo "### 🤖 Antigravity"
            echo
            echo '```'
            printf '%s\n' "$out" | tail -c 60000
            echo '```'
          } > "$RUNNER_TEMP/agy-reply.md"
          gh issue comment "$ISSUE_NUMBER" --body-file "$RUNNER_TEMP/agy-reply.md"

          emit --type run.completed --actor ci --payload '{"project_hash":"ci_aak_agy_mention","status":"completed","validation_state":"unavailable","observed_model_tier":"standard"}'
          bash tooling/shared/agent-audit/finalize-run.sh --source-root "$GITHUB_WORKSPACE" --run-id "$AAK_AUDIT_RUN_ID" >/dev/null 2>&1 || true
