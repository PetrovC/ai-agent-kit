name: PR — routing eval

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'scripts/select-skills.py'
      - 'scripts/select-model.py'
      - 'skills/**'
      - 'config/model-policy.yaml'
      - 'tooling/shared/delegate/delegate.py'
      - 'tests/routing/**'
      - 'tests/skills/**'
      - 'tests/bats/routing.bats'
      - 'tests/bats/model-routing.bats'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  routing-eval:
    name: Offline routing eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7.0.0

      - name: Run skill selector on all skill fixtures
        run: |
          set -euo pipefail
          errors=0
          for fixture in tests/routing/fixtures/*.yaml; do
            # Skip model-selection fixtures (handled in the next step)
            name=$(basename "$fixture" .yaml)
            case "$name" in model-*) continue ;; esac
            echo "--- skill fixture: $name ---"

            task=$(python3 -c "
          import sys
          lines = open('$fixture').read()
          import re
          m = re.search(r'^task: [\"\'](.*)[\"\']$', lines, re.MULTILINE)
          print(m.group(1) if m else '')
          ")

            files=$(python3 -c "
          import sys, re
          content = open('$fixture').read()
          m = re.search(r'^files:\n((?:  - .*\n)*)', content, re.MULTILINE)
          if m:
              paths = re.findall(r'  - \"([^\"]+)\"', m.group(1))
              print(','.join(paths))
          else:
              print('')
          ")

            if [[ -n "$files" ]]; then
              python3 scripts/select-skills.py --task "$task" --files "$files" || {
                echo "FAILED: $fixture"
                errors=$((errors+1))
              }
            else
              python3 scripts/select-skills.py --task "$task" || {
                echo "FAILED: $fixture"
                errors=$((errors+1))
              }
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1
          echo "All skill fixtures passed"

      - name: Run model selector on all model fixtures
        run: |
          set -euo pipefail
          errors=0
          for fixture in tests/routing/fixtures/model-*.yaml; do
            name=$(basename "$fixture" .yaml)
            echo "--- model fixture: $name ---"

            task=$(python3 -c "
          import re
          lines = open('$fixture').read()
          m = re.search(r'^task: \"(.*)\"', lines, re.MULTILINE)
          if not m:
              m = re.search(r\"^task: '(.*)'\", lines, re.MULTILINE)
          print(m.group(1) if m else '')
          ")

            risk=$(python3 -c "
          import re
          lines = open('$fixture').read()
          m = re.search(r'^risk: (\w+)', lines, re.MULTILINE)
          print(m.group(1) if m else 'medium')
          ")

            ctx=$(python3 -c "
          import re
          lines = open('$fixture').read()
          m = re.search(r'^context_size: (\w+)', lines, re.MULTILINE)
          print(m.group(1) if m else 'medium')
          ")

            python3 scripts/select-model.py \
              --task "$task" --risk "$risk" --context-size "$ctx" || {
              echo "FAILED: $fixture"
              errors=$((errors+1))
            }
          done
          [[ "$errors" -eq 0 ]] || exit 1
          echo "All model fixtures passed"

      - name: Run skill evals
        run: bash tests/skills/run-evals.sh

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Run routing BATS tests
        run: bats tests/bats/routing.bats

      - name: Run model routing BATS tests
        run: bats tests/bats/model-routing.bats
