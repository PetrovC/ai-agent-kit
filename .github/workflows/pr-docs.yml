name: PR — docs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-skills:
    name: Skill structure check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      - name: Every skill must have a SKILL.md
        run: |
          errors=0
          for dir in skills/*/; do
            if [[ ! -f "${dir}SKILL.md" ]]; then
              echo "MISSING SKILL.md in: $dir"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Every SKILL.md must have a Final response requirements section
        run: |
          # Split skills (#158) keep this section in the SKILL.deep.md companion,
          # so accept it in either the core SKILL.md or its SKILL.deep.md.
          errors=0
          for f in skills/*/SKILL.md; do
            deep="${f%SKILL.md}SKILL.deep.md"
            if ! grep -q "Final response requirements" "$f" \
               && ! { [[ -f "$deep" ]] && grep -q "Final response requirements" "$deep"; }; then
              echo "MISSING 'Final response requirements' in: $f (or its SKILL.deep.md)"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

  lint-yaml:
    name: YAML syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      # We use Python + PyYAML (preinstalled on ubuntu-latest) instead of
      # `snap install yq` so the YAML lint is deterministic: a future Snap
      # channel rotation of yq cannot silently change parsing semantics or
      # exit codes here. PyYAML is the same parser the rest of this workflow
      # already relies on for the static semantics check below.
      - name: Validate every YAML file parses + workflow templates declare 'on' + 'jobs'
        run: |
          python3 - <<'PY'
          import glob, os, sys, yaml

          errors = 0

          # 1. Parse every *.yml / *.yaml in the repo (skipping vendored dirs)
          #    and report the first parse error per file.
          to_check = []
          for ext in ("*.yml", "*.yaml"):
              to_check += glob.glob(f"**/{ext}", recursive=True)
          for f in sorted(set(to_check)):
              if "/node_modules/" in f or "/.git/" in f:
                  continue
              try:
                  with open(f, encoding="utf-8") as fh:
                      yaml.safe_load(fh)
                  print(f"OK: {f}")
              except yaml.YAMLError as e:
                  print(f"INVALID YAML: {f}")
                  for line in str(e).splitlines()[:5]:
                      print(f"  {line}")
                  errors += 1

          # 2. Every workflow template + every shipped workflow must declare
          #    `on:` and `jobs:`. PyYAML parses the unquoted YAML 1.1 key
          #    `on:` as Python `True` (boolean), so a strict `"on" in keys`
          #    check would miss the workflows that don't quote it — accept
          #    either form.
          for f in sorted(glob.glob("prompts/github-actions/*.yml") +
                          glob.glob(".github/workflows/*.yml")):
              try:
                  with open(f, encoding="utf-8") as fh:
                      doc = yaml.safe_load(fh)
              except yaml.YAMLError:
                  # Already reported above.
                  continue
              if not isinstance(doc, dict):
                  print(f"MISSING 'on' or 'jobs' in: {f}")
                  errors += 1
                  continue
              keys = set(doc.keys())
              has_on = ("on" in keys) or (True in keys)
              has_jobs = "jobs" in keys
              if not (has_on and has_jobs):
                  print(f"MISSING 'on' or 'jobs' in: {f}")
                  errors += 1

          sys.exit(1 if errors else 0)
          PY

  routing-consistency:
    name: Skill routing consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      - name: Every skill must appear in all three routing tables
        run: |
          errors=0
          for dir in skills/*/; do
            skill=$(basename "$dir")
            # Claude — `<skill>` skill
            if ! grep -qE "\`${skill}\`[[:space:]]+skill" tooling/claude/CLAUDE.md; then
              echo "MISSING from tooling/claude/CLAUDE.md: $skill"
              errors=$((errors+1))
            fi
            # Codex — `$<skill>` (fixed-string match avoids regex back-reference parsing)
            codex_pattern="\`\$${skill}\`"
            if ! grep -qF "$codex_pattern" tooling/codex/AGENTS.md; then
              echo "MISSING from tooling/codex/AGENTS.md: \$$skill"
              errors=$((errors+1))
            fi
            # Antigravity — must reference the INSTALLED path .agy/skills/<skill>/SKILL.md
            # (install copies skills there; a bare skills/ path is broken in the target).
            if ! grep -qE "\.agy/skills/${skill}/SKILL\.md" tooling/agy/AGY.md; then
              echo "MISSING/!.agy-path from tooling/agy/AGY.md: .agy/skills/$skill/SKILL.md"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Reverse — every Antigravity router skill path must resolve to a real skill
        run: |
          errors=0
          grep -oE '\.agy/skills/[a-z0-9-]+/SKILL\.md' tooling/agy/AGY.md \
            | sed -E 's#\.agy/skills/([a-z0-9-]+)/SKILL\.md#\1#' | sort -u \
            | while read -r s; do
                [[ -z "$s" ]] && continue
                if [[ ! -d "skills/$s" ]]; then
                  echo "STALE router row: tooling/agy/AGY.md -> skills/$s (does not exist)"
                  exit 1
                fi
              done

      - name: Antigravity command .toml must not reference the bare skills/ path
        run: |
          # In an installed project skills live under .agy/skills/, never
          # a top-level skills/ — a `Read skills/<x>/SKILL.md` line is a broken
          # reference in every target repo.
          if grep -rnE 'Read[[:space:]]+skills/[a-z0-9-]+/SKILL\.md' tooling/agy/commands/; then
            echo "Antigravity command references bare skills/ path (use .agy/skills/...)"
            exit 1
          fi
          echo "OK: Antigravity commands use the installed .agy/skills/ path"

      - name: The 5 subagents must have identical names across all 3 tools
        run: |
          claude=$(ls -1 tooling/claude/agents/*.md  | xargs -n1 basename | sed 's/\.md$//'   | sort | tr '\n' ',')
          agy=$(ls -1 tooling/agy/agents/*.md  | xargs -n1 basename | sed 's/\.md$//'   | sort | tr '\n' ',')
          codex=$(ls -1d tooling/codex/skills/*/     | xargs -n1 basename                     | sort | tr '\n' ',')
          echo "claude=[$claude] agy=[$agy] codex=[$codex]"
          if [[ "$claude" != "$agy" || "$claude" != "$codex" ]]; then
            echo "Subagent set drift across claude/agy/codex"
            exit 1
          fi
          echo "OK: subagent sets identical across the 3 tools"

      - name: Documented counts + CHANGELOG version must match reality
        run: |
          errors=0
          skills=$(find skills -maxdepth 1 -mindepth 1 -type d | wc -l | tr -d ' ')
          if [[ ! -f VERSION ]]; then
            echo "MISSING VERSION"
            errors=$((errors+1))
            kit_ver=""
          else
            kit_ver=$(tr -d '\r' < VERSION)
            if ! [[ "$kit_ver" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "VERSION must contain semver only, got: $kit_ver"
              errors=$((errors+1))
            fi
          fi
          chg_ver=$(grep -oE '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [[ "$chg_ver" != "$kit_ver" ]]; then
            echo "CHANGELOG top version ($chg_ver) != VERSION ($kit_ver)"
            errors=$((errors+1))
          fi
          for f in README.md .claude-plugin/marketplace.json .claude-plugin/plugin.json tooling/claude/CLAUDE.md; do
            if grep -qE '\b30 skills\b' "$f" && [[ "$skills" -ne 30 ]]; then
              echo "$f says '30 skills' but found $skills"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1
          echo "OK: counts/version consistent (skills=$skills, version=$kit_ver)"

  lint-changelog-presence:
    name: CHANGELOG entry required for feat/fix/perf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6
        with:
          fetch-depth: 0

      # Resolves audit finding T6: PRs that introduce user-facing change
      # (Conventional Commits `feat`, `fix`, `perf`, or any breaking-marker
      # `!` variant) must touch CHANGELOG.md, so the per-PR drift between
      # the code and the release notes that produced v1.20.0 (#214) cannot
      # silently reopen. `docs`, `chore`, `ci`, `style`, `refactor`, `test`
      # are exempt — they're either non-user-facing or already documented
      # by their nature.
      - name: feat/fix/perf PRs must add a CHANGELOG entry
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          needs_entry=0
          # Match `<feat|fix|perf>(<scope>)?!?:` — covers feat:, feat(scope):,
          # feat!:, feat(scope)!:, and the same for fix / perf.
          if [[ "$PR_TITLE" =~ ^(feat|fix|perf)(\([^\)]+\))?!?:[[:space:]] ]]; then
            needs_entry=1
          # Any-type breaking-marker (`<anytype>!:`) is also user-facing.
          elif [[ "$PR_TITLE" =~ ^[a-z]+(\([^\)]+\))?!:[[:space:]] ]]; then
            needs_entry=1
          fi

          if [[ "$needs_entry" -eq 0 ]]; then
            echo "PR title '$PR_TITLE' is not feat/fix/perf/breaking — CHANGELOG entry not required."
            exit 0
          fi

          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qx 'CHANGELOG.md'; then
            echo "OK: '$PR_TITLE' touches CHANGELOG.md"
            exit 0
          fi

          echo ""
          echo "::error::PR title '$PR_TITLE' is feat/fix/perf/breaking but CHANGELOG.md was not modified."
          echo ""
          echo "Add an entry under '## [Unreleased]' in CHANGELOG.md describing the"
          echo "user-visible change. If this PR is not user-facing, change the"
          echo "Conventional Commits type to docs/chore/ci/style/refactor/test."
          exit 1

  lint-doc-links:
    name: Intra-repo markdown links resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      # Audit T8: catch broken intra-repo markdown links. Links to external
      # URLs (http/https/mailto) and pure anchors are skipped; links inside
      # fenced code blocks or inline code spans are stripped before
      # scanning. This catches both authoring mistakes (typos, renamed
      # files) AND the subtler "relative path that works in the canonical
      # source but breaks in the dogfood copy" pattern — skills/<x>/SKILL.md
      # at depth 2 vs .claude/skills/<x>/SKILL.md at depth 3 means the same
      # `../../docs/ai/<file>.md` resolves to different paths in each.
      - name: Every relative markdown link must resolve to an existing file
        run: |
          python3 - <<'PY'
          import os, re, sys

          md_files = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('.git', 'node_modules')]
              for f in files:
                  if f.endswith('.md'):
                      p = os.path.join(root, f).replace('\\', '/')
                      if p.startswith('./'):
                          p = p[2:]
                      md_files.append(p)

          # Inline links only — not images (the negative lookbehind on `!`).
          LINK = re.compile(r'(?<!!)\[([^\]]*)\]\(([^)]+)\)')

          errs = []
          for mdfile in sorted(md_files):
              with open(mdfile, encoding='utf-8') as fh:
                  content = fh.read()
              # Strip fenced code blocks and inline code spans so example
              # snippets inside skills/commands don't trip false positives.
              text = re.sub(r'```[\s\S]*?```', '', content)
              text = re.sub(r'`[^`\n]+`', '', text)

              for m in LINK.finditer(text):
                  target = m.group(2).strip()
                  if target.startswith(('http://', 'https://', 'mailto:', '#')):
                      continue
                  # Drop optional title: `path "title"`.
                  target = re.split(r'\s+', target, maxsplit=1)[0]
                  # Drop anchor + query.
                  target = target.split('#', 1)[0].split('?', 1)[0]
                  if not target:
                      continue
                  srcdir = os.path.dirname(mdfile)
                  resolved = os.path.normpath(os.path.join(srcdir, target))
                  if not os.path.exists(resolved):
                      errs.append(
                          f"{mdfile}: broken link -> {target!r} "
                          f"(resolves to {resolved!r})")

          if errs:
              print("\n".join(errs))
              print(f"\n{len(md_files)} markdown files scanned, "
                    f"{len(errs)} broken link(s)")
              sys.exit(1)
          print(f"OK: {len(md_files)} markdown files scanned, 0 broken links")
          PY

  lint-workflow-semantics:
    name: GitHub Actions workflow semantics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      - name: Workflow templates must be semantically correct
        run: |
          python3 - <<'PY'
          import glob, re, sys
          errs = []
          GH = "prompts/github-actions"

          def read(p): return open(p, encoding="utf-8").read()

          # 1. codex-action safety-strategy must be a valid value.
          valid_ss = {"drop-sudo", "unprivileged-user", "read-only", "unsafe"}
          for f in glob.glob(f"{GH}/*.yml"):
              for m in re.finditer(r'safety-strategy:\s*"?([a-z-]+)"?', read(f)):
                  if m.group(1) not in valid_ss:
                      errs.append(f"{f}: invalid safety-strategy '{m.group(1)}' (valid: {sorted(valid_ss)})")

          # 2. Any workflow that triggers on pull_request_review_comment must NOT
          #    gate solely on github.event.issue.pull_request (doesn't exist there).
          for f in glob.glob(f"{GH}/*.yml"):
              t = read(f)
              if "pull_request_review_comment:" in t and "github.event.issue.pull_request" in t:
                  if "github.event_name == 'pull_request_review_comment'" not in t:
                      errs.append(f"{f}: uses github.event.issue.pull_request but also triggers on "
                                  "pull_request_review_comment without an event_name split")

          # 3. codex-pr-review must post the final-message (codex-action doesn't auto-comment).
          cpr = f"{GH}/codex-pr-review.yml"
          t = read(cpr)
          if "final-message" not in t or "github-script" not in t:
              errs.append(f"{cpr}: missing a step that posts steps.*.outputs.final-message")

          # 4. Comment-triggered agent workflows must filter by author_association.
          for f in glob.glob(f"{GH}/*.yml"):
              t = read(f)
              if "issue_comment:" in t or "pull_request_review_comment:" in t:
                  if "author_association" not in t:
                      errs.append(f"{f}: comment-triggered but no author_association filter")

          # 5. Untrusted event fields (issue/PR/comment title or body) must NOT
          #    be interpolated raw into an agent `prompt:` — that is a prompt-
          #    injection sink. They must be captured via env: + fenced as DATA
          #    (see ai-fallback-dispatch for the safe pattern). This
          #    audits ALL workflows, not only comment-triggered ones.
          UNTRUSTED = re.compile(
              r'\$\{\{\s*github\.event\.'
              r'(issue|pull_request|comment|review)\.(title|body)\s*\}\}')
          for f in glob.glob(f"{GH}/*.yml"):
              t = read(f)
              for m in re.finditer(r'prompt:\s*[|>]?\s*\n((?:[ \t]+.*\n?)+)', t):
                  if UNTRUSTED.search(m.group(1)):
                      errs.append(f"{f}: untrusted github.event.*.(title|body) "
                                  "interpolated directly into a prompt: block — "
                                  "pass via env: and fence it as untrusted DATA")

          # 6. ai-fallback-dispatch's PR-completion gate must enforce the
          #    DOCUMENTED contract: non-draft AND body contains "Closes #<N>".
          #    A state+draft check alone (the original gate) lets a non-draft
          #    PR without the closing keyword (or on the wrong issue) falsely
          #    short-circuit the chain.
          aif = f"{GH}/ai-fallback-dispatch.yml"
          t = read(aif)
          # Count every `gh pr list` query that drives a gate decision and
          # verify it pulls `body` AND filters with `contains("Closes #" + $n)`.
          pr_list_blocks = re.findall(
              r'gh pr list[^\n]*\n(?:[ \t]+[^\n]*\n)+', t)
          gate_blocks = [b for b in pr_list_blocks if 'isDraft==false' in b]
          if not gate_blocks:
              errs.append(f"{aif}: no gate-style `gh pr list` block found")
          for b in gate_blocks:
              if 'body' not in b or 'Closes #' not in b:
                  errs.append(f"{aif}: gate `gh pr list` block does not enforce "
                              "the documented 'body contains Closes #<N>' contract")
                  break

          # 7. ai-fallback-dispatch must declare a schedule trigger AND a
          #    discover job that runs on schedule — otherwise the documented
          #    capped-retry behavior is unreachable (issue #47 regression).
          if not re.search(r'\n\s*schedule:\s*\n\s*-\s*cron:', t):
              errs.append(f"{aif}: schedule cron trigger missing — capped "
                          "retry is documented but unreachable without it")
          if "github.event_name == 'schedule'" not in t:
              errs.append(f"{aif}: no job gated on `github.event_name == "
                          "'schedule'` — schedule events would have no entry "
                          "point and would do nothing")

          # 11. Antigravity model names must all be GA-stable across all
          #     Antigravity surfaces (settings.json, every subagent's
          #     frontmatter, the AGY.md `--model` hint, and the README
          #     capability table).
          #     Tiered models are allowed (different agents may use different
          #     models based on task risk), but every model must be in the
          #     approved GA list — preview / unreleased models are rejected.
          #     (issue #43 regression + issue #143 tiering).
          #     The list is the GA Gemini model names used across every
          #     Antigravity surface: settings.json, every subagent's
          #     frontmatter, the AGY.md `--model` hint, and the README table.
          #     Antigravity invokes Google's Gemini models directly, so the IDs
          #     are Gemini-branded; the non-existent `agy-*` form (a migration
          #     find/replace artifact) is intentionally rejected (issue #302).
          APPROVED_MODELS = {
              "gemini-3.1-pro", "gemini-3-flash", "gemini-3.5-flash",
              "gemini-3.1-flash-lite",
              "gemini-3-pro", "gemini-2.5-pro", "gemini-2.5-flash",
          }
          # Each pattern captures `[a-z0-9.-]+` so trailing punctuation in
          # prose (e.g. the backtick-fenced "`--model <name>`" hint in
          # AGY.md) isn't included in the captured model name.
          agy_model_files = {
              "tooling/agy/settings.json": r'"name":\s*"([a-z0-9.-]+)"',
              "tooling/agy/AGY.md": r'--model\s+([a-z0-9.-]+)',
              "tooling/agy/agents/architect.md": r'^model:\s*([a-z0-9.-]+)',
              "tooling/agy/agents/code-reviewer.md": r'^model:\s*([a-z0-9.-]+)',
              "tooling/agy/agents/codebase-investigator.md": r'^model:\s*([a-z0-9.-]+)',
              "tooling/agy/agents/security-reviewer.md": r'^model:\s*([a-z0-9.-]+)',
              "tooling/agy/agents/test-runner.md": r'^model:\s*([a-z0-9.-]+)',
          }
          seen_models = {}
          for f, pat in agy_model_files.items():
              try:
                  t = read(f)
              except FileNotFoundError:
                  continue
              m = re.search(pat, t, flags=re.MULTILINE)
              if not m:
                  errs.append(f"{f}: expected a model declaration matching `{pat}`")
                  continue
              seen_models.setdefault(m.group(1), []).append(f)
          # README capability table lists the model for each subagent; the
          # strings are markdown-fenced (`gemini-...`) so harvest them
          # separately and merge into the same seen-models dict.
          try:
              readme = read("README.md")
              for m in re.finditer(r'\| `((?:gemini|agy)-[a-z0-9-]+)` \|', readme):
                  seen_models.setdefault(m.group(1), []).append("README.md")
          except FileNotFoundError:
              pass
          # Reject any model not in the approved GA list.
          for name, files in seen_models.items():
              if name not in APPROVED_MODELS:
                  errs.append(
                      f"Non-GA model '{name}' found in {sorted(set(files))}. "
                      f"Use one of: {sorted(APPROVED_MODELS)} (issue #43/#143)"
                  )

          # 12. MCP `npx -y` example blocks must pin the package version with
          #     `@<x.y.z>` (or a real `@N.N.N`) — `npx -y <pkg>` without a
          #     version installs whatever the registry serves at startup,
          #     auto-running future releases with whatever access (PAT, FS,
          #     DB) the user has configured (issue #93 regression).
          #     The negative lookbehind `(?<![/\w])` skips the URL form
          #     (`npmjs.com/package/@modelcontextprotocol/server-…`) and any
          #     unrelated word characters — only EXECUTION-context mentions
          #     (`"@modelcontextprotocol/server-…"` in args / config) need a
          #     pin.
          for f in ("tooling/claude/.mcp.example.jsonc",
                    "tooling/codex/config.toml",
                    "skills/ai-dev/SKILL.md"):
              try:
                  t = read(f)
              except FileNotFoundError:
                  continue
              for m in re.finditer(
                      r'(?<![/\w])@modelcontextprotocol/server-[a-z0-9-]+', t):
                  e = m.end()
                  tail = t[e:e + 24]
                  if not re.match(r'@(<[^>]+>|[0-9]+(?:\.[0-9]+){1,2})', tail):
                      errs.append(f"{f}: unpinned `{m.group(0)}` example — "
                                  "append `@<x.y.z>` (or a real version) so "
                                  "future releases don't auto-run (issue #93)")
                      break

          # 13. Stack-agnostic prompts + ISSUE_TEMPLATE: no hardcoded
          #     `dotnet test`, `npm test`, `npm run …` build/test
          #     prescriptions in the kit's copy-paste templates. Bias-by-
          #     default makes the kit feel .NET/npm-only and confuses agents
          #     pointed at Python / Go / Rust projects (issue #73). The
          #     dependency-update / tech-debt / security-audit prompts list
          #     ALL stacks as explicit menus and are exempt.
          BIAS_EXEMPT = {
              "prompts/dependency-update.md",
              "prompts/tech-debt.md",
              "prompts/security-audit.md",
          }
          BIAS_PATTERN = re.compile(r'\b(dotnet (?:test|build|run|format)|npm (?:test|run))\b')
          for f in (glob.glob("prompts/*.md") +
                    glob.glob(".github/ISSUE_TEMPLATE/*.md")):
              if f in BIAS_EXEMPT:
                  continue
              t = read(f)
              hits = list(BIAS_PATTERN.finditer(t))
              if hits:
                  example = hits[0].group(0)
                  errs.append(f"{f}: stack-specific command `{example}` — "
                              "reference docs/ai/COMMANDS.md instead (issue #73)")

          # 14. tooling/codex/config.toml must NOT show the project-local
          #     `notify = [...]` example — Codex ignores `notify` in
          #     project-scoped config; the example told users to do
          #     something that silently does nothing (issue #46).
          codex_toml = "tooling/codex/config.toml"
          try:
              t = read(codex_toml)
          except FileNotFoundError:
              t = ""
          # Match an actual (commented) example: a `notify = [...]` line.
          # The fixed file has prose comments mentioning `notify` but no
          # `notify = [` assignment.
          if re.search(r'^[#\s]*notify\s*=\s*\[', t, flags=re.MULTILINE):
              errs.append(f"{codex_toml}: contains a project-local "
                          "`notify = [...]` example — Codex ignores this "
                          "key in project-scoped config; either remove the "
                          "example or move it to a `~/.codex/config.toml` "
                          "reference (issue #46)")

          # 15. PR-review templates that listen to `issue_comment` must
          #     materialize the PR diff explicitly (issue #81). Without it,
          #     `actions/checkout@v4` lands on the default branch and the
          #     agent reviews HEAD-of-main instead of the PR diff —
          #     producing reviews that look real but cover the wrong code.
          #     Required signal: a `gh pr diff` invocation somewhere in
          #     the workflow file (the pr-review workflows run it
          #     unconditionally).
          PR_REVIEW_WORKFLOWS = (
              "prompts/github-actions/codex-pr-review.yml",
          )
          for f in PR_REVIEW_WORKFLOWS:
              t = read(f)
              if "issue_comment:" not in t:
                  continue   # not a comment-triggered workflow, nothing to assert
              if "gh pr diff" not in t:
                  errs.append(f"{f}: comment-triggered PR-review workflow with "
                              "no `gh pr diff` invocation — the agent will "
                              "review the default branch instead of the PR "
                              "(issue #81)")

          # 16. Shared skills under skills/<name>/SKILL.md may carry
          #     allowed-tools in their YAML frontmatter (Claude reads it,
          #     Codex/Antigravity ignore it), but every entry MUST use the
          #     Claude-recognized `Bash(<cmd>:*)` shape. Anything else
          #     would be both invalid Claude syntax AND silently ignored
          #     by Codex/Antigravity (issue #92 regression). See
          #     `skills/README.md` for the full contract.
          ALLOWED_TOOL_RE = re.compile(r'^\s*-\s*"?Bash\([^"]+\)"?\s*$')
          for f in sorted(glob.glob("skills/*/SKILL.md")):
              t = read(f)
              # Frontmatter block: between the first two `---` lines.
              fm = re.match(r'^---\n(.*?)\n---\n', t, flags=re.DOTALL)
              if not fm:
                  continue
              fm_text = fm.group(1)
              # Find the allowed-tools block (if any) and walk its items.
              at = re.search(r'^allowed-tools:\s*\n((?:[ \t]+-\s*.*\n?)+)',
                             fm_text, flags=re.MULTILINE)
              if not at:
                  continue
              for line in at.group(1).splitlines():
                  if not line.strip():
                      continue
                  if not ALLOWED_TOOL_RE.match(line):
                      errs.append(f"{f}: allowed-tools entry `{line.strip()}` "
                                  "must use Claude's `Bash(<cmd>:*)` shape — "
                                  "Codex/Antigravity ignore the field, and anything "
                                  "else is invalid for Claude too (issue #92)")

          # 17. The consolidated agent-mention workflow must keep its shape:
          #     ONE workflow holding the claude/codex/agy jobs, with the retired
          #     duplicate (`agent-codex-agy-on-mention.yml`) staying deleted, and
          #     the security model preserved. Both files once subscribed to
          #     issue_comment, so every comment fired both and the non-targeted
          #     one fully-skipped — emailing a "Run skipped" notification. A
          #     regression here would resurrect that noise or quietly weaken the
          #     comment-trigger security boundary (least-privilege permissions,
          #     mention gate, maintainer gate, issue_comment restriction for
          #     codex/agy).
          import os, yaml
          MENTION_WF = ".github/workflows/agent-on-mention.yml"
          RETIRED_WF = ".github/workflows/agent-codex-agy-on-mention.yml"
          if os.path.exists(RETIRED_WF):
              errs.append(f"{RETIRED_WF}: the duplicate mention workflow must "
                          "stay deleted — it re-introduces a second always-"
                          "skipping run (and skip email) per comment")
          if not os.path.exists(MENTION_WF):
              errs.append(f"{MENTION_WF}: consolidated mention workflow is missing")
          else:
              wf = yaml.safe_load(read(MENTION_WF))
              # PyYAML parses the unquoted `on:` key as the boolean True.
              triggers = set(wf.get(True, wf.get("on")) or {})
              if triggers != {"issue_comment", "pull_request_review_comment"}:
                  errs.append(f"{MENTION_WF}: triggers must be exactly "
                              "issue_comment + pull_request_review_comment, got "
                              f"{sorted(triggers)}")
              if wf.get("permissions") != {"contents": "read"}:
                  errs.append(f"{MENTION_WF}: top-level permissions must be "
                              "least-privilege {contents: read}, got "
                              f"{wf.get('permissions')}")
              jobs = wf.get("jobs", {})
              if set(jobs) != {"claude", "codex", "agy"}:
                  errs.append(f"{MENTION_WF}: jobs must be exactly "
                              f"claude/codex/agy, got {sorted(jobs)}")
              EXPECTED_PERMS = {
                  "claude": {"contents": "write", "pull-requests": "write",
                             "issues": "write"},
                  "codex": {"contents": "read", "issues": "write",
                            "pull-requests": "write"},
                  "agy": {"contents": "read", "issues": "write",
                          "pull-requests": "write"},
              }
              MENTION = {"claude": "@claude", "codex": "@codex", "agy": "@agy"}
              MAINTAINER = ("OWNER", "MEMBER", "COLLABORATOR")
              for name, perms in EXPECTED_PERMS.items():
                  job = jobs.get(name, {})
                  if job.get("permissions") != perms:
                      errs.append(f"{MENTION_WF}: job '{name}' permissions must "
                                  f"be {perms}, got {job.get('permissions')}")
                  cond = job.get("if", "")
                  if MENTION[name] not in cond:
                      errs.append(f"{MENTION_WF}: job '{name}' must gate on a "
                                  f"`{MENTION[name]}` mention")
                  if not all(a in cond for a in MAINTAINER):
                      errs.append(f"{MENTION_WF}: job '{name}' must gate on a "
                                  "maintainer author_association "
                                  "(OWNER/MEMBER/COLLABORATOR)")
                  # codex/agy reply via `gh issue comment "$ISSUE_NUMBER"`, which
                  # has no number on review-comment events — they must restrict
                  # to issue_comment so the retained review-comment trigger only
                  # reaches the claude job.
                  if name in ("codex", "agy") and \
                          "github.event_name == 'issue_comment'" not in cond:
                      errs.append(f"{MENTION_WF}: job '{name}' must restrict to "
                                  "`github.event_name == 'issue_comment'`")

          if errs:
              print("\n".join(errs)); sys.exit(1)
          print("OK: workflow semantics valid")
          PY
