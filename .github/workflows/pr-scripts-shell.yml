name: PR — scripts (shell)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-example:
    name: Validate filled example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate examples/filled-project
        run: bash scripts/validate.sh --target examples/filled-project

      - name: validate.sh requires every project-template/*.md and flags non-comment placeholders
        run: |
          set -euo pipefail

          # Fresh install must fail validation — every project-template/*.md
          # is installed with STOP notices, HTML-comment placeholders, AND
          # non-comment placeholders (closes #52: every shipped template must
          # be required; closes #95: non-comment placeholders must be detected).
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools claude >/dev/null
          set +e
          out="$(bash scripts/validate.sh --target "$T" 2>&1)"
          rc=$?
          set -e
          if [[ "$rc" -eq 0 ]]; then
            echo "FAIL: validate passed on a fresh, unfilled install"
            echo "$out"; exit 1
          fi
          # All seven shipped templates must appear in the required check.
          for f in PROJECT.md ARCHITECTURE.md COMMANDS.md DECISIONS.md GLOSSARY.md ROADMAP.md TESTING.md; do
            echo "$out" | grep -qF "$f present" \
              || { echo "FAIL: $f not listed as required"; echo "$out"; exit 1; }
          done
          # Non-comment placeholders must be reported on files known to ship them.
          echo "$out" | grep -q "Templates still containing non-comment placeholders" \
            || { echo "FAIL: non-comment placeholders section missing"; exit 1; }
          for f in PROJECT.md ARCHITECTURE.md ROADMAP.md TESTING.md; do
            echo "$out" | grep -qE "$f: [1-9][0-9]* non-comment placeholder" \
              || { echo "FAIL: $f non-comment placeholders not reported"; echo "$out"; exit 1; }
          done

          # Closes #52: any required file removed must produce a MISSING warning
          # and a non-zero exit — DECISIONS.md, GLOSSARY.md, ROADMAP.md were
          # previously only checked when already present.
          for missing in DECISIONS.md GLOSSARY.md ROADMAP.md; do
            T2="$(mktemp -d)"
            bash scripts/install.sh --target "$T2" --tools claude >/dev/null
            rm "$T2/docs/ai/$missing"
            set +e
            out="$(bash scripts/validate.sh --target "$T2" 2>&1)"
            rc=$?
            set -e
            if [[ "$rc" -eq 0 ]]; then
              echo "FAIL: validate passed with $missing deleted"; echo "$out"; exit 1
            fi
            echo "$out" | grep -qF "$missing MISSING" \
              || { echo "FAIL: deleted $missing not flagged"; echo "$out"; exit 1; }
            rm -rf "$T2"
          done

          rm -rf "$T"
          echo "OK: validate.sh requires all 7 templates and detects non-comment placeholders"

  smoke-install:
    name: Smoke install (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kit into temp project
        run: |
          mkdir -p /tmp/smoke-target
          bash scripts/install.sh --target /tmp/smoke-target --tools codex,claude,gemini

      - name: Verify expected files exist
        run: |
          files=(
            "/tmp/smoke-target/AGENTS.md"
            "/tmp/smoke-target/CLAUDE.md"
            "/tmp/smoke-target/GEMINI.md"
            "/tmp/smoke-target/.kit-version"
            "/tmp/smoke-target/.mcp.json"
            "/tmp/smoke-target/.mcp.example.jsonc"
            "/tmp/smoke-target/.claude/settings.json"
            "/tmp/smoke-target/.claude/hooks/format-on-save.sh"
            "/tmp/smoke-target/.claude/hooks/pre-bash-guard.sh"
            "/tmp/smoke-target/.claude/hooks/notify-done.sh"
            "/tmp/smoke-target/.claude/hooks/session-summary.sh"
            "/tmp/smoke-target/.claude/rules/test-naming.md"
            "/tmp/smoke-target/.claude/rules/migration-safety.md"
            "/tmp/smoke-target/.claude/rules/env-safety.md"
            "/tmp/smoke-target/.claude/commands/bug-fix.md"
            "/tmp/smoke-target/.claude/commands/code-review.md"
            "/tmp/smoke-target/.claude/commands/feature-planning.md"
            "/tmp/smoke-target/.codex/config.toml"
            "/tmp/smoke-target/.codex/hooks.json"
            "/tmp/smoke-target/.codex/hooks/pre-bash-guard.sh"
            "/tmp/smoke-target/.codex/hooks/format-on-save.sh"
            "/tmp/smoke-target/.codex/hooks/notify-done.sh"
            "/tmp/smoke-target/.agents/skills/architect/SKILL.md"
            "/tmp/smoke-target/.agents/skills/security-reviewer/SKILL.md"
            "/tmp/smoke-target/.gemini/commands/bug-fix.toml"
            "/tmp/smoke-target/.gemini/commands/security-audit.toml"
            "/tmp/smoke-target/.gemini/hooks/pre-bash-guard.sh"
            "/tmp/smoke-target/docs/ai/PROJECT.md"
          )
          for f in "${files[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Verify hook scripts are executable
        run: |
          for f in /tmp/smoke-target/.claude/hooks/*.sh /tmp/smoke-target/.codex/hooks/*.sh /tmp/smoke-target/.gemini/hooks/*.sh; do
            if [[ ! -x "$f" ]]; then
              echo "NOT EXECUTABLE: $f"
              exit 1
            fi
            echo "EXECUTABLE: $f"
          done

      - name: Dry-run update (no changes expected)
        run: bash scripts/update.sh --target /tmp/smoke-target --dry-run

      - name: Dry-run uninstall
        run: bash scripts/uninstall.sh --target /tmp/smoke-target --dry-run

      - name: install.sh .gitignore hints cover env.example whitelist + session-log
        run: |
          set -euo pipefail

          # Case 1: .gitignore is missing. Hints must still be printed as a
          # bootstrap recipe, not silently skipped (closes #64).
          T="$(mktemp -d)"
          out="$(bash scripts/install.sh --target "$T" --tools claude)"
          echo "$out" | grep -q ".gitignore not found - create it with at least:" \
            || { echo "FAIL: missing-.gitignore banner not emitted"; echo "$out" | tail -25; exit 1; }
          for need in \
              ".claude/settings.local.json" \
              ".claude/session-log/" \
              "CLAUDE.local.md" \
              ".env" \
              ".env.*" \
              "!.env.example" \
              "!.env.*.example"; do
            echo "$out" | grep -qF -- "$need" \
              || { echo "FAIL: missing-.gitignore hint did not include '$need'"; echo "$out" | tail -25; exit 1; }
          done

          # Case 2: existing .gitignore that has the old short list. The new
          # entries (session-log, env.example whitelist) must be suggested.
          T2="$(mktemp -d)"
          cat > "$T2/.gitignore" <<'EOF'
          .claude/settings.local.json
          CLAUDE.local.md
          .env
          .env.*
          EOF
          out2="$(bash scripts/install.sh --target "$T2" --tools claude)"
          for need in ".claude/session-log/" "!.env.example" "!.env.*.example"; do
            echo "$out2" | grep -qF -- "$need" \
              || { echo "FAIL: existing-.gitignore hint missed '$need'"; echo "$out2" | tail -25; exit 1; }
          done

          # Case 3: a project that already ships the full recommended set must
          # produce no .gitignore hint at all — the suggestion is silent when
          # nothing is missing. Guards against false noise on well-configured repos.
          T3="$(mktemp -d)"
          cat > "$T3/.gitignore" <<'EOF'
          .claude/settings.local.json
          .claude/session-log/
          CLAUDE.local.md
          .env
          .env.*
          !.env.example
          !.env.*.example
          EOF
          out3="$(bash scripts/install.sh --target "$T3" --tools claude)"
          echo "$out3" | grep -q ".gitignore - add these entries" \
            && { echo "FAIL: complete .gitignore should not trigger a hint"; echo "$out3" | tail -25; exit 1; }

          # Case 4: the recommended snippet must actually keep .env.example
          # versioned under real git semantics — verifies the order of
          # `.env.*` followed by `!.env.example`.
          T4="$(mktemp -d)"
          cd "$T4"
          git init -q
          cat > .gitignore <<'EOF'
          .env
          .env.*
          !.env.example
          !.env.*.example
          EOF
          touch .env .env.production .env.example .env.production.example
          if ! git check-ignore .env >/dev/null;       then echo "FAIL: .env not ignored";                   exit 1; fi
          if ! git check-ignore .env.production >/dev/null; then echo "FAIL: .env.production not ignored"; exit 1; fi
          if   git check-ignore .env.example >/dev/null;    then echo "FAIL: .env.example wrongly ignored"; exit 1; fi
          if   git check-ignore .env.production.example >/dev/null; then echo "FAIL: .env.production.example wrongly ignored"; exit 1; fi
          cd - >/dev/null
          echo "OK: install.sh hints + recommended snippet honour env.example + session-log"

      - name: Bash arg parsers reject missing values and normalize --tools
        run: |
          set -euo pipefail
          T="$(mktemp -d)"

          # Helper: assert a script invocation fails with the expected message.
          # `--` after `grep -qF` stops option parsing so a pattern that starts
          # with `--` (like "--target requires a value") is treated as data,
          # not a flag.
          assert_fail() {
            local label="$1" expect="$2"; shift 2
            local out rc
            set +e
            out="$( "$@" 2>&1 )"
            rc=$?
            set -e
            if [[ "$rc" -eq 0 ]]; then
              echo "FAIL[$label]: command unexpectedly succeeded"; echo "$out"; exit 1
            fi
            if ! echo "$out" | grep -qF -- "$expect"; then
              echo "FAIL[$label]: expected '$expect' in stderr"; echo "$out"; exit 1
            fi
          }

          # Closes #84: every value-bearing flag must reject a missing value
          # with a clear "requires a value" message instead of a `set -u` crash.
          assert_fail "install --target missing"  "--target requires a value" \
              bash scripts/install.sh --target
          assert_fail "install --target as flag"  "--target requires a value, got " \
              bash scripts/install.sh --target --tools codex
          assert_fail "install --tools missing"   "--tools requires a value" \
              bash scripts/install.sh --target "$T" --tools
          assert_fail "update --target missing"   "--target requires a value" \
              bash scripts/update.sh --target
          assert_fail "uninstall --tools as flag" "--tools requires a value, got " \
              bash scripts/uninstall.sh --target "$T" --tools --dry-run
          assert_fail "validate --target missing" "--target requires a value" \
              bash scripts/validate.sh --target
          assert_fail "new-skill --name missing"  "--name requires a value" \
              bash scripts/new-skill.sh --name
          assert_fail "new-skill --desc as flag"  "--description requires a value, got " \
              bash scripts/new-skill.sh --description --name foo

          # Closes #84 (empty list): `--tools ""` and `--tools ", , "` must
          # fail with a precise message, not let an empty TOOL_LIST through.
          assert_fail "install empty --tools"        "--tools list is empty" \
              bash scripts/install.sh --target "$T" --tools ""
          assert_fail "install whitespace --tools"   "--tools list is empty" \
              bash scripts/install.sh --target "$T" --tools " , , "

          # Closes #54: --tools must accept the same grammar on Bash as on
          # PowerShell — whitespace tolerated, case-insensitive.
          T2="$(mktemp -d)"
          out="$(bash scripts/install.sh --target "$T2" --tools "Codex, Claude, GEMINI")"
          echo "$out" | grep -qE "Tools[[:space:]]+:[[:space:]]+codex,claude,gemini" \
            || { echo "FAIL: mixed-case --tools was not normalized"; echo "$out" | head -10; exit 1; }
          grep -qF "tools: codex,claude,gemini" "$T2/.kit-version" \
            || { echo "FAIL: .kit-version stamp not normalized"; cat "$T2/.kit-version"; exit 1; }

          # Run on a normalized list — update/uninstall must accept the same
          # mixed grammar without crashing on whitespace or case.
          bash scripts/update.sh    --target "$T2" --tools "  codex , CLAUDE "   --dry-run >/dev/null \
            || { echo "FAIL: update rejected normalized-grammar --tools"; exit 1; }
          bash scripts/uninstall.sh --target "$T2" --tools "Gemini"              --dry-run >/dev/null \
            || { echo "FAIL: uninstall rejected case-only --tools"; exit 1; }

          # Empty --description is still valid (new-skill.sh falls back to a
          # default text); only missing-arg and accidental-flag-as-value are
          # rejected. The "missing" path is covered by the assert_fail above.

          rm -rf "$T" "$T2"
          echo "OK: arg parsers reject missing values and normalize --tools cross-shell"

  lint-shell:
    name: Shell scripts + hooks must be valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n (syntax) on every script and hook
        run: |
          bad=0
          while IFS= read -r -d '' f; do
            if bash -n "$f"; then echo "OK: $f"; else echo "SYNTAX ERROR: $f"; bad=1; fi
          done < <(find scripts tooling -type f -name "*.sh" -print0)
          [[ "$bad" -eq 0 ]] || exit 1

      - name: shellcheck (preinstalled on ubuntu-latest)
        run: |
          # SC1090/1091: dynamic `source` paths are intentional in the kit.
          shellcheck --severity=warning -e SC1090,SC1091 \
            scripts/*.sh tooling/claude/hooks/*.sh tooling/codex/hooks/*.sh

  e2e-lifecycle:
    name: install -> update -> uninstall -> new-skill (no dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Real update is a no-op right after install
        run: |
          set -euo pipefail
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools codex,claude,gemini >/dev/null
          # A real (non-dry-run) update immediately after install must report
          # nothing changed — proves update.sh's compare path is correct.
          out="$(bash scripts/update.sh --target "$T")"
          echo "$out"
          echo "$out" | grep -q "Everything is up to date" \
            || { echo "FAIL: update.sh reported changes right after install"; exit 1; }

      - name: Hooks stay executable across a real update
        run: |
          set -euo pipefail
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools claude,codex >/dev/null
          chmod -x "$T/.claude/hooks/pre-bash-guard.sh" "$T/.codex/hooks/pre-bash-guard.sh"
          bash scripts/update.sh --target "$T" >/dev/null
          for h in "$T/.claude/hooks/pre-bash-guard.sh" "$T/.codex/hooks/pre-bash-guard.sh"; do
            [[ -x "$h" ]] || { echo "FAIL: $h not executable after update"; exit 1; }
          done
          echo "OK: hooks executable after real update"

      - name: Real uninstall removes the kit and preserves docs/ai + .mcp.json
        run: |
          set -euo pipefail
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools codex,claude,gemini >/dev/null
          echo "user note" > "$T/docs/ai/PROJECT.md"
          bash scripts/uninstall.sh --target "$T" >/dev/null
          # .mcp.json is project-owned after install (the user configures MCP
          # servers in it), so uninstall must leave it alone — same policy as
          # docs/ai/. .mcp.example.jsonc is the kit's versioned reference and
          # is removed.
          for p in .claude .codex .gemini .agents .kit-version .kit-manifest \
                   AGENTS.md CLAUDE.md GEMINI.md .mcp.example.jsonc; do
            [[ -e "$T/$p" ]] && { echo "FAIL: uninstall left $p"; exit 1; }
          done
          [[ -f "$T/docs/ai/PROJECT.md" ]] || { echo "FAIL: uninstall destroyed docs/ai"; exit 1; }
          [[ -f "$T/.mcp.json" ]]         || { echo "FAIL: uninstall removed project-owned .mcp.json"; exit 1; }
          echo "OK: uninstall clean, docs/ai + .mcp.json preserved"

      - name: uninstall.sh preserves user files inside managed tool directories
        run: |
          set -euo pipefail
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools codex,claude,gemini >/dev/null
          # Plant user-owned files in every kit-managed directory and a
          # settings.local.json the README tells users to keep.
          mkdir -p "$T/.claude/agents" "$T/.claude/commands" "$T/.claude/hooks" \
                   "$T/.claude/rules"  "$T/.claude/skills/team" \
                   "$T/.codex/hooks"   "$T/.agents/skills/team" \
                   "$T/.gemini/commands" "$T/.gemini/skills/team"
          echo user > "$T/.claude/agents/team-agent.md"
          echo user > "$T/.claude/commands/team-cmd.md"
          echo user > "$T/.claude/hooks/team-hook.sh"
          echo user > "$T/.claude/rules/team-rule.md"
          echo user > "$T/.claude/skills/team/SKILL.md"
          echo user > "$T/.codex/hooks/team-hook.sh"
          echo user > "$T/.agents/skills/team/SKILL.md"
          echo user > "$T/.gemini/commands/team.toml"
          echo user > "$T/.gemini/skills/team/SKILL.md"
          echo local > "$T/.claude/settings.local.json"

          bash scripts/uninstall.sh --target "$T" >/dev/null

          # User files must all survive.
          for p in \
            .claude/agents/team-agent.md \
            .claude/commands/team-cmd.md \
            .claude/hooks/team-hook.sh \
            .claude/rules/team-rule.md \
            .claude/skills/team/SKILL.md \
            .claude/settings.local.json \
            .codex/hooks/team-hook.sh \
            .agents/skills/team/SKILL.md \
            .gemini/commands/team.toml \
            .gemini/skills/team/SKILL.md ; do
            [[ -f "$T/$p" ]] || { echo "FAIL: uninstall destroyed user file $p"; exit 1; }
          done

          # Kit files must all be removed (the manifest is the source of truth).
          # .mcp.json is project-owned after install and is exercised separately.
          for p in \
            AGENTS.md CLAUDE.md GEMINI.md .mcp.example.jsonc .kit-manifest .kit-version \
            .claude/agents/architect.md .claude/commands/bug-fix.md \
            .claude/hooks/pre-bash-guard.sh .claude/skills/python/SKILL.md \
            .codex/config.toml .codex/hooks/pre-bash-guard.sh \
            .agents/skills/python/SKILL.md \
            .gemini/commands/bug-fix.toml .gemini/skills/python/SKILL.md ; do
            [[ -e "$T/$p" ]] && { echo "FAIL: kit-owned $p survived uninstall"; exit 1; }
          done
          echo "OK: uninstall removes only kit-owned files"

      - name: install + update never overwrite project-owned .mcp.json
        run: |
          set -euo pipefail
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools claude >/dev/null
          # Configure a real MCP server in the project file — exactly the use
          # case the README describes ("paste comment-free blocks into .mcp.json").
          cat > "$T/.mcp.json" <<'EOF'
          {
            "mcpServers": {
              "github": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-github"],
                "env": { "GITHUB_TOKEN": "${GITHUB_TOKEN}" }
              }
            }
          }
          EOF
          USER_MCP_HASH="$(md5sum "$T/.mcp.json" | awk '{print $1}')"

          # 1. Re-running install must NOT overwrite the configured file.
          out="$(bash scripts/install.sh --target "$T" --tools claude)"
          echo "$out" | grep -q "\[skip\] .mcp.json" \
            || { echo "FAIL: install did not skip existing .mcp.json"; echo "$out" | tail -20; exit 1; }
          [[ "$(md5sum "$T/.mcp.json" | awk '{print $1}')" == "$USER_MCP_HASH" ]] \
            || { echo "FAIL: install overwrote project-owned .mcp.json"; exit 1; }

          # 2. update must NOT touch .mcp.json, even when its content differs
          # from the kit template. .mcp.example.jsonc is still refreshed.
          rm "$T/.mcp.example.jsonc"
          out="$(bash scripts/update.sh --target "$T" --tools claude)"
          [[ "$(md5sum "$T/.mcp.json" | awk '{print $1}')" == "$USER_MCP_HASH" ]] \
            || { echo "FAIL: update overwrote project-owned .mcp.json"; exit 1; }
          [[ -f "$T/.mcp.example.jsonc" ]] \
            || { echo "FAIL: update did not restore .mcp.example.jsonc"; exit 1; }
          echo "$out" | grep -q "NEW      .mcp.example.jsonc" \
            || { echo "FAIL: update did not report .mcp.example.jsonc as NEW"; echo "$out"; exit 1; }
          echo "$out" | grep -q ".mcp.json" \
            && { echo "FAIL: update mentioned .mcp.json (should be silent)"; exit 1; }

          # 3. .mcp.json must not be tracked in the manifest.
          grep -q "^\.mcp\.json$" "$T/.kit-manifest" \
            && { echo "FAIL: .mcp.json is listed in the manifest"; exit 1; }

          # 4. uninstall must preserve .mcp.json (project-owned, like docs/ai/).
          bash scripts/uninstall.sh --target "$T" --tools claude >/dev/null
          [[ -f "$T/.mcp.json" ]] \
            || { echo "FAIL: uninstall removed project-owned .mcp.json"; exit 1; }
          [[ "$(md5sum "$T/.mcp.json" | awk '{print $1}')" == "$USER_MCP_HASH" ]] \
            || { echo "FAIL: uninstall mutated .mcp.json"; exit 1; }
          [[ -e "$T/.mcp.example.jsonc" ]] \
            && { echo "FAIL: uninstall left kit-owned .mcp.example.jsonc"; exit 1; }
          echo "OK: .mcp.json survives install reruns, update, and uninstall"

      - name: uninstall.sh manifest-less fallback removes only files the kit still ships
        run: |
          set -euo pipefail
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools codex,claude,gemini >/dev/null
          # Simulate a legacy install: drop the manifest, then add a user file.
          rm "$T/.kit-manifest"
          mkdir -p "$T/.claude/agents"
          echo legacy-user > "$T/.claude/agents/legacy-user.md"
          out="$(bash scripts/uninstall.sh --target "$T")"
          echo "$out" | grep -q "No .kit-manifest found" \
            || { echo "FAIL: legacy banner missing"; exit 1; }
          [[ -f "$T/.claude/agents/legacy-user.md" ]] \
            || { echo "FAIL: legacy fallback destroyed a user file"; exit 1; }
          [[ ! -e "$T/CLAUDE.md" ]] \
            || { echo "FAIL: legacy fallback left CLAUDE.md"; exit 1; }
          [[ ! -e "$T/.claude/agents/architect.md" ]] \
            || { echo "FAIL: legacy fallback left a kit agent"; exit 1; }
          echo "OK: legacy fallback removes only files this kit version ships"

      - name: install.sh partial run preserves other tools' manifest entries + kit-version
        run: |
          set -euo pipefail
          # Closes #71: install --tools gemini on top of codex+claude must
          # MERGE the new manifest entries with the codex+claude ones, not
          # overwrite them.
          # Closes #40 (install path): partial install must UNION the new
          # tools with the already-installed set in .kit-version, not shrink.
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools codex,claude,gemini >/dev/null
          before_lines="$(wc -l < "$T/.kit-manifest")"
          before_codex="$(grep -c '^\.codex/' "$T/.kit-manifest" || true)"
          before_claude="$(grep -c '^\.claude/' "$T/.kit-manifest" || true)"
          before_gemini="$(grep -c '^\.gemini/' "$T/.kit-manifest" || true)"

          # Partial reinstall: only gemini in --tools, but the kit-managed
          # codex+claude files are still on disk; their manifest entries must
          # survive the rewrite.
          bash scripts/install.sh --target "$T" --tools gemini >/dev/null
          after_lines="$(wc -l < "$T/.kit-manifest")"
          after_codex="$(grep -c '^\.codex/' "$T/.kit-manifest" || true)"
          after_claude="$(grep -c '^\.claude/' "$T/.kit-manifest" || true)"
          after_gemini="$(grep -c '^\.gemini/' "$T/.kit-manifest" || true)"

          if [[ "$after_lines" -lt "$before_lines" ]]; then
            echo "FAIL: partial install shrank the manifest ($before_lines -> $after_lines)"; exit 1
          fi
          for t in codex claude gemini; do
            b="before_${t}"; a="after_${t}"
            if [[ "${!a}" -lt "${!b}" ]]; then
              echo "FAIL: partial install dropped $t manifest entries (${!b} -> ${!a})"; exit 1
            fi
          done

          if ! grep -qF "tools: codex,claude,gemini" "$T/.kit-version"; then
            echo "FAIL: partial install shrank .kit-version tool set"; cat "$T/.kit-version"; exit 1
          fi

          # Reverse direction: starting from a single-tool install, adding
          # more tools must UPDATE .kit-version to the union.
          T2="$(mktemp -d)"
          bash scripts/install.sh --target "$T2" --tools codex >/dev/null
          grep -qF "tools: codex" "$T2/.kit-version" || { echo "FAIL: initial single-tool stamp wrong"; exit 1; }
          bash scripts/install.sh --target "$T2" --tools claude >/dev/null
          grep -qF "tools: codex,claude" "$T2/.kit-version" \
            || { echo "FAIL: install --tools claude did not union with codex"; cat "$T2/.kit-version"; exit 1; }
          bash scripts/install.sh --target "$T2" --tools gemini >/dev/null
          grep -qF "tools: codex,claude,gemini" "$T2/.kit-version" \
            || { echo "FAIL: install --tools gemini did not union with codex,claude"; cat "$T2/.kit-version"; exit 1; }

          rm -rf "$T" "$T2"
          echo "OK: install merges manifest + unions kit-version on partial runs"

      - name: update.sh + uninstall.sh keep .kit-version in sync with the installed tool set
        run: |
          set -euo pipefail
          # Closes #40 (update path): partial update must NOT shrink the
          # installed tool set; the stamp must keep codex,claude,gemini.
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools codex,claude,gemini >/dev/null
          bash scripts/update.sh --target "$T" --tools gemini >/dev/null
          grep -qF "tools: codex,claude,gemini" "$T/.kit-version" \
            || { echo "FAIL: update --tools gemini shrank the installed tool set"; cat "$T/.kit-version"; exit 1; }

          # Closes #40 (uninstall path): partial uninstall must REWRITE
          # .kit-version with the remaining tools AND drop the removed tool's
          # manifest entries so a later default update doesn't think the
          # removed tool is still installed.
          bash scripts/uninstall.sh --target "$T" --tools codex >/dev/null
          grep -qF "tools: claude,gemini" "$T/.kit-version" \
            || { echo "FAIL: uninstall --tools codex did not rewrite the installed tool set"; cat "$T/.kit-version"; exit 1; }
          if grep -q '^\.codex/' "$T/.kit-manifest" || grep -q '^AGENTS.md$' "$T/.kit-manifest"; then
            echo "FAIL: codex entries still in manifest after uninstall --tools codex"
            grep -E '^\.codex/|^AGENTS\.md$' "$T/.kit-manifest" || true
            exit 1
          fi
          # A subsequent default update must respect the new installed set
          # (claude,gemini only) and NOT reinstall codex.
          bash scripts/update.sh --target "$T" >/dev/null
          [[ ! -e "$T/AGENTS.md" ]] \
            || { echo "FAIL: update silently reinstalled AGENTS.md after codex uninstall"; exit 1; }

          # All-tools uninstall still removes both metadata files entirely.
          bash scripts/uninstall.sh --target "$T" >/dev/null
          [[ ! -e "$T/.kit-version" ]] || { echo "FAIL: .kit-version survived all-tools uninstall"; exit 1; }
          [[ ! -e "$T/.kit-manifest" ]] || { echo "FAIL: .kit-manifest survived all-tools uninstall"; exit 1; }

          rm -rf "$T"
          echo "OK: update preserves and uninstall narrows .kit-version + .kit-manifest"

      - name: install.sh "next steps" message accurately describes update preservation (closes #58)
        run: |
          set -euo pipefail
          # The previous "without overwriting your local edits" line was
          # misleading: update.sh refreshes managed kit files when they
          # differ, only docs/ai/ + .mcp.json are truly preserved.
          T="$(mktemp -d)"
          out="$(bash scripts/install.sh --target "$T" --tools claude)"

          # New, accurate framing must be present.
          echo "$out" | grep -qF "refresh kit-managed files while preserving docs/ai/ and .mcp.json" \
            || { echo "FAIL: accurate update-preservation message missing"; echo "$out" | tail -20; exit 1; }
          echo "$out" | grep -qF "Local edits to those files WILL be overwritten" \
            || { echo "FAIL: update overwrite warning missing"; echo "$out" | tail -20; exit 1; }

          # The misleading line must be gone.
          if echo "$out" | grep -qF "without overwriting your local edits"; then
            echo "FAIL: misleading 'without overwriting' phrase still present"
            exit 1
          fi
          rm -rf "$T"
          echo "OK: install message accurately describes update semantics"

      - name: update.sh fails loudly when a required kit source is missing (closes #68)
        run: |
          set -euo pipefail
          # Stand up a sandbox kit checkout so we can remove a source file
          # without breaking the real working tree for subsequent CI steps.
          KIT="$(mktemp -d)"
          cp -r VERSION scripts tooling skills project-template examples "$KIT/"
          T="$(mktemp -d)"
          bash "$KIT/scripts/install.sh" --target "$T" --tools claude >/dev/null

          # Real update on an intact kit must still succeed and be a no-op.
          bash "$KIT/scripts/update.sh" --target "$T" >/dev/null
          echo "intact-source update OK"

          # Now break a REQUIRED kit source and confirm update aborts loudly.
          rm "$KIT/tooling/claude/CLAUDE.md"
          set +e
          out="$(bash "$KIT/scripts/update.sh" --target "$T" 2>&1)"
          rc=$?
          set -e
          if [[ "$rc" -eq 0 ]]; then
            echo "FAIL: missing required kit source did not fail update"
            echo "$out"; exit 1
          fi
          echo "$out" | grep -qF "required kit source missing" \
            || { echo "FAIL: missing-source error message wrong"; echo "$out"; exit 1; }
          echo "$out" | grep -qF "CLAUDE.md" \
            || { echo "FAIL: error did not name the missing file"; echo "$out"; exit 1; }

          # update must NOT have written "Everything is up to date" before failing.
          if echo "$out" | grep -q "Everything is up to date"; then
            echo "FAIL: update reported success-status before noticing missing source"; exit 1
          fi

          rm -rf "$T" "$KIT"
          echo "OK: update fails loudly on missing required source"

      - name: update.sh manifest GC prunes only de-shipped kit files
        run: |
          set -euo pipefail
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools claude >/dev/null
          test -f "$T/.kit-manifest"
          # Simulate a future version that stopped shipping a command, plus a
          # user file and docs/ai that must survive.
          echo ".claude/commands/ghost.md" >> "$T/.kit-manifest"
          mkdir -p "$T/.claude/commands"
          echo stale > "$T/.claude/commands/ghost.md"
          echo mine  > "$T/.claude/commands/my-own.md"
          echo doc   > "$T/docs/ai/PROJECT.md"
          out="$(bash scripts/update.sh --target "$T" --tools claude)"
          echo "$out" | grep -q "PRUNED   .claude/commands/ghost.md" || { echo "FAIL: ghost not pruned"; exit 1; }
          [[ -e "$T/.claude/commands/ghost.md" ]] && { echo "FAIL: ghost still present"; exit 1; }
          [[ -f "$T/.claude/commands/my-own.md" ]] || { echo "FAIL: GC ate a user file"; exit 1; }
          [[ -f "$T/docs/ai/PROJECT.md" ]] || { echo "FAIL: GC touched docs/ai"; exit 1; }
          # Partial-tools safety: codex/gemini entries must never be pruned by a
          # claude-only run even when present in the manifest.
          T2="$(mktemp -d)"
          bash scripts/install.sh --target "$T2" --tools codex,claude,gemini >/dev/null
          gem_skill="$(grep -m1 '^\.gemini/skills/' "$T2/.kit-manifest")"
          bash scripts/update.sh --target "$T2" --tools claude >/dev/null
          [[ -f "$T2/$gem_skill" ]] || { echo "FAIL: claude-only update pruned a gemini file"; exit 1; }
          echo "OK: GC prunes de-shipped kit files only; user/docs/other-tool safe"

      - name: update.sh preserves unknown legacy Codex agent files
        run: |
          set -euo pipefail
          T="$(mktemp -d)"
          bash scripts/install.sh --target "$T" --tools codex >/dev/null
          mkdir -p "$T/.codex/agents"
          echo "project-owned" > "$T/.codex/agents/architect.toml"

          dry="$(bash scripts/update.sh --target "$T" --tools codex --dry-run)"
          echo "$dry" | grep -q "SKIPPED  .codex/agents/architect.toml (legacy; ownership unknown)" \
            || { echo "FAIL: unknown legacy file was not reported as skipped"; exit 1; }

          bash scripts/update.sh --target "$T" --tools codex >/dev/null
          [[ -f "$T/.codex/agents/architect.toml" ]] \
            || { echo "FAIL: update.sh deleted a project-owned legacy agent"; exit 1; }

          T2="$(mktemp -d)"
          bash scripts/install.sh --target "$T2" --tools codex >/dev/null
          mkdir -p "$T2/.codex/agents"
          echo "kit-owned" > "$T2/.codex/agents/code-reviewer.toml"
          echo ".codex/agents/code-reviewer.toml" >> "$T2/.kit-manifest"
          out="$(bash scripts/update.sh --target "$T2" --tools codex)"
          echo "$out" | grep -q "PRUNED   .codex/agents/code-reviewer.toml" \
            || { echo "FAIL: manifest-owned legacy file was not pruned"; exit 1; }
          [[ ! -e "$T2/.codex/agents/code-reviewer.toml" ]] \
            || { echo "FAIL: manifest-owned legacy file survived"; exit 1; }
          echo "OK: update.sh gates legacy Codex cleanup on manifest ownership"

      - name: new-skill.sh scaffolds a routable, CI-valid skill
        run: |
          set -euo pipefail
          bash scripts/new-skill.sh --name ci-probe-skill --description "Use for the CI e2e probe."
          test -f skills/ci-probe-skill/SKILL.md
          grep -q "Final response requirements" skills/ci-probe-skill/SKILL.md
          grep -qE '`ci-probe-skill`[[:space:]]+skill' tooling/claude/CLAUDE.md
          grep -qF '`$ci-probe-skill`' tooling/codex/AGENTS.md
          grep -qE '\.gemini/skills/ci-probe-skill/SKILL\.md' tooling/gemini/GEMINI.md
          # Closes #69 parity: bash must never write `$$<name>` into AGENTS.md.
          # The PS interpolation bug produced exactly that string; this guard
          # catches a regression in either script.
          if grep -qF '$$ci-probe-skill' tooling/codex/AGENTS.md; then
            echo "FAIL: AGENTS.md contains \$\$<name> corruption (issue #69 regression)"; exit 1
          fi
          echo "OK: new-skill scaffold is routable in all 3 tools"

      - name: new-skill.sh rejects malformed and Windows-reserved slugs
        run: |
          set -euo pipefail
          # Closes #96: slug must be lowercase alphanumeric segments joined by
          # single hyphens, and must not be a Windows reserved device name.
          for bad in "foo-" "foo--bar" "Foo" "1foo" "" "con" "CON" "nul" "com1" "lpt9"; do
            set +e
            out="$(bash scripts/new-skill.sh --name "$bad" 2>&1)"
            rc=$?
            set -e
            if [[ "$rc" -eq 0 ]]; then
              echo "FAIL: new-skill.sh accepted invalid slug '$bad'"; exit 1
            fi
          done
          echo "OK: malformed and reserved slugs rejected"

      - name: new-skill.sh reports partial routing accurately and exits non-zero
        run: |
          set -euo pipefail
          # Closes #85: when an anchor is missing, the script must surface a
          # per-file ANCHOR-NOT-FOUND summary and exit non-zero so CI / release
          # scripts never treat a partial scaffold as a successful one.
          cp tooling/claude/CLAUDE.md /tmp/CLAUDE.md.bak
          sed -i 's/## Subagent routing/## WAS_SUBAGENT_ROUTING_FOR_TEST/g' tooling/claude/CLAUDE.md

          set +e
          out="$(bash scripts/new-skill.sh --name partial-routing-probe 2>&1)"
          rc=$?
          set -e

          # Restore CLAUDE.md immediately so a partial-test failure doesn't
          # corrupt the rest of the job.
          mv /tmp/CLAUDE.md.bak tooling/claude/CLAUDE.md
          rm -rf skills/partial-routing-probe
          git checkout -- tooling/codex/AGENTS.md tooling/gemini/GEMINI.md

          if [[ "$rc" -eq 0 ]]; then
            echo "FAIL: partial routing should have exited non-zero (got 0)"; echo "$out"; exit 1
          fi
          echo "$out" | grep -qF "CLAUDE.md: ANCHOR NOT FOUND" \
            || { echo "FAIL: missing CLAUDE.md anchor not reported"; echo "$out"; exit 1; }
          echo "$out" | grep -qF "AGENTS.md: row added" \
            || { echo "FAIL: AGENTS.md success not reported"; echo "$out"; exit 1; }
          echo "$out" | grep -qF "GEMINI.md: row added" \
            || { echo "FAIL: GEMINI.md success not reported"; echo "$out"; exit 1; }
          echo "$out" | grep -qF "WARNING: one or more routing anchors were missing" \
            || { echo "FAIL: warning summary missing"; echo "$out"; exit 1; }
          echo "OK: partial-routing detection accurate, exit non-zero"
