name: PR — tooling configs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-claude:
    name: Claude tooling validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      - name: Every rule file must have a paths frontmatter key
        run: |
          errors=0
          for f in tooling/claude/rules/*.md; do
            if ! grep -q "^paths:" "$f"; then
              echo "MISSING 'paths:' frontmatter in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Claude settings templates must declare $schema and no invalid outputStyle
        run: |
          python3 - <<'PY'
          import json, sys
          errs = []
          for path in ("tooling/claude/settings.json", "tooling/claude/settings.windows.json"):
              s = json.load(open(path))
              if s.get("$schema") != "https://json.schemastore.org/claude-code-settings.json":
                  errs.append(f"{path} missing/!official $schema")
              # "default" is not a documented outputStyle value; absence = default behaviour.
              if s.get("outputStyle") == "default":
                  errs.append(f'{path} outputStyle:"default" is not a valid value (remove the key)')
          if errs:
              print("\n".join(errs)); sys.exit(1)
          print("OK: Claude settings templates schema + outputStyle valid")
          PY

      - name: Subagent tools must use the documented comma-string form
        run: |
          errors=0
          for f in tooling/claude/agents/*.md; do
            # Official subagent .md frontmatter documents `tools: A, B, C`
            # (comma-separated string), not a YAML list under `tools:`.
            if grep -qE '^tools:[[:space:]]*$' "$f"; then
              echo "YAML-list tools: in $f (use 'tools: A, B, C' string form)"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Every Claude subagent must declare explicit Stop conditions
        run: |
          # Guards issues #157 / #161. Stop conditions keep subagents from
          # open-ended exploration; without them, investigator-style agents
          # silently scale and the report becomes padding.
          errors=0
          for f in tooling/claude/agents/*.md; do
            if ! grep -qE '^Stop conditions' "$f"; then
              echo "MISSING 'Stop conditions' section in: $f"
              errors=$((errors+1))
            fi
          done
          # The codebase-investigator must additionally state a file-read
          # budget so it escalates instead of silently scaling.
          if ! grep -qE 'files would be needed|file.*budget' tooling/claude/agents/codebase-investigator.md; then
            echo "MISSING file-read budget in: tooling/claude/agents/codebase-investigator.md"
            errors=$((errors+1))
          fi
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Each .claude/commands/*.md must declare a description
        run: |
          errors=0
          for f in tooling/claude/commands/*.md; do
            if [[ ! -f "$f" ]]; then continue; fi
            if ! grep -qE '^description:' "$f"; then
              echo "MISSING 'description:' frontmatter in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: tooling/claude/.mcp.json must parse as strict JSON
        run: |
          # Claude Code rejects JSONC. The reference-with-comments lives in
          # .mcp.example.jsonc; the installed .mcp.json must be strict JSON.
          if ! python3 -c "import json,sys; json.load(open('tooling/claude/.mcp.json'))"; then
            echo "tooling/claude/.mcp.json is not strict JSON"
            exit 1
          fi
          if grep -qE '^\s*//' tooling/claude/.mcp.json; then
            echo "tooling/claude/.mcp.json contains // comments — must be strict JSON"
            exit 1
          fi
          echo "OK: .mcp.json is strict JSON"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: WebFetch entries must be domain-scoped HTTPS, not wildcards or schemes
        run: |
          errors=0
          # Extract WebFetch(domain:...) entries; verify each domain is a plausible hostname.
          domains=$(jq -r '.permissions.allow[] | select(startswith("WebFetch(domain:"))' tooling/claude/settings.json \
                    | sed -E 's/^WebFetch\(domain:([^)]+)\)$/\1/')
          while IFS= read -r d; do
            [[ -z "$d" ]] && continue
            if [[ "$d" == "*" || "$d" == *"*"* ]]; then
              echo "WILDCARD DOMAIN (too broad): $d"
              errors=$((errors+1))
            elif [[ "$d" == http://* || "$d" == https://* ]]; then
              echo "DOMAIN SHOULD NOT INCLUDE SCHEME: $d"
              errors=$((errors+1))
            elif [[ ! "$d" =~ ^[a-zA-Z0-9]([a-zA-Z0-9.-]*[a-zA-Z0-9])?$ ]]; then
              echo "INVALID DOMAIN FORMAT: $d"
              errors=$((errors+1))
            else
              echo "OK: $d"
            fi
          done <<< "$domains"
          [[ "$errors" -eq 0 ]] || exit 1

  lint-codex:
    name: Codex tooling validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      - name: Each approval_policy line must use a value the Rust CLI accepts
        run: |
          errors=0
          # Valid values per https://developers.openai.com/codex/config-reference
          # on-failure is deprecated -> rejected here so the kit can't regress.
          while IFS= read -r line; do
            value=$(echo "$line" | sed -E 's/.*approval_policy[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
            case "$value" in
              untrusted|on-request|never) ;;
              on-failure)
                echo "DEPRECATED approval_policy value: on-failure (use on-request or never)"
                errors=$((errors+1))
                ;;
              *)
                echo "INVALID approval_policy value: $value"
                errors=$((errors+1))
                ;;
            esac
          done < <(grep -hE '^[[:space:]]*approval_policy[[:space:]]*=' tooling/codex/*.toml)
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Codex .toml files must parse
        run: |
          # Ubuntu runners ship Python 3.11+ which has tomllib in the stdlib.
          errors=0
          for f in tooling/codex/*.toml; do
            if ! python3 -c "import tomllib,sys; tomllib.load(open('$f','rb'))"; then
              echo "INVALID TOML: $f"
              errors=$((errors+1))
            else
              echo "OK: $f"
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Codex hook JSON templates must parse
        run: |
          python3 - <<'PY'
          import json
          for path in ("tooling/codex/hooks.json", "tooling/codex/hooks.windows.json"):
              with open(path) as f:
                  json.load(f)
              print(f"OK: {path}")
          PY

      - name: config.toml must not document the invalid web_search value
        run: |
          # Valid web_search string values are: disabled | cached | live.
          # "enabled" is NOT a Codex value (common mistake). Guard the comment
          # so a user copying it can't set an invalid config.
          if grep -qiE 'web.search|^#.*enabled.*always fetch' tooling/codex/config.toml \
             && grep -qE '^#[[:space:]]*enabled[[:space:]]' tooling/codex/config.toml; then
            echo "config.toml documents 'enabled' for web_search; valid value is 'live'"
            exit 1
          fi
          echo "OK: web_search documentation uses valid values"

      - name: Each Codex subagent skill must have name + description frontmatter
        run: |
          errors=0
          for f in tooling/codex/skills/*/SKILL.md; do
            if [[ ! -f "$f" ]]; then continue; fi
            if ! grep -qE '^name:[[:space:]]' "$f"; then
              echo "MISSING 'name:' frontmatter in: $f"
              errors=$((errors+1))
            fi
            if ! grep -qE '^description:' "$f"; then
              echo "MISSING 'description:' frontmatter in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: No leftover .codex/agents/*.toml files should be tracked
        run: |
          if [[ -d "tooling/codex/agents" ]]; then
            echo "Legacy directory tooling/codex/agents/ should be removed (replaced by tooling/codex/skills/)"
            exit 1
          fi

  lint-agy:
    name: Antigravity tooling validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      - name: Each Antigravity subagent must have name + description frontmatter
        run: |
          errors=0
          for f in tooling/agy/agents/*.md; do
            if [[ ! -f "$f" ]]; then continue; fi
            if ! grep -qE '^name:[[:space:]]' "$f"; then
              echo "MISSING 'name:' frontmatter in: $f"
              errors=$((errors+1))
            fi
            if ! grep -qE '^description:' "$f"; then
              echo "MISSING 'description:' frontmatter in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Every Antigravity subagent must declare explicit Stop conditions
        run: |
          # Guards issues #157 / #161 for Antigravity parity with Claude.
          errors=0
          for f in tooling/agy/agents/*.md; do
            if ! grep -qE '^Stop conditions' "$f"; then
              echo "MISSING 'Stop conditions' section in: $f"
              errors=$((errors+1))
            fi
          done
          if ! grep -qE 'files would be needed|file.*budget' tooling/agy/agents/codebase-investigator.md; then
            echo "MISSING file-read budget in: tooling/agy/agents/codebase-investigator.md"
            errors=$((errors+1))
          fi
          [[ "$errors" -eq 0 ]] || exit 1

      - name: No Antigravity agent or settings must reference a preview model
        run: |
          errors=0
          for f in tooling/agy/agents/*.md tooling/agy/settings.json tooling/agy/AGY.md; do
            [[ -f "$f" ]] || continue
            # Allow the word "preview" only inside shell comments (# ...)
            if grep -E '^[^#]*-preview' "$f"; then
              echo "PREVIEW model found in: $f (use a GA model — gemini-3.1-pro or gemini-3-flash)"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Each Antigravity command .toml must declare prompt + description
        run: |
          errors=0
          for f in tooling/agy/commands/*.toml; do
            if [[ ! -f "$f" ]]; then continue; fi
            if ! grep -qE '^prompt[[:space:]]*=' "$f"; then
              echo "MISSING 'prompt =' in: $f"
              errors=$((errors+1))
            fi
            if ! grep -qE '^description[[:space:]]*=' "$f"; then
              echo "MISSING 'description =' in: $f"
              errors=$((errors+1))
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: Antigravity command .toml files must parse
        run: |
          errors=0
          for f in tooling/agy/commands/*.toml; do
            if ! python3 -c "import tomllib,sys; tomllib.load(open('$f','rb'))"; then
              echo "INVALID TOML: $f"
              errors=$((errors+1))
            else
              echo "OK: $f"
            fi
          done
          [[ "$errors" -eq 0 ]] || exit 1

      - name: agy-extension.json must be valid JSON with name + version
        run: |
          python3 -c "import json; d=json.load(open('tooling/agy/agy-extension.json')); assert d.get('name') and d.get('version'), 'name/version required'"
          echo "OK: agy-extension.json"

  lint-platform-variant-parity:
    name: POSIX/Windows JSON variants must share the same key set
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6

      # Audit P1-D. install.sh copies tooling/{claude/settings.json,
      # codex/hooks.json}; install.ps1 copies the *.windows.json sibling.
      # validate.sh accepts either as a source candidate, so byte-for-byte
      # divergence is expected (paths, command flags differ by OS). What
      # MUST stay aligned is the JSON *key shape* — a key added on one side
      # but not the other means one platform silently loses a hook /
      # setting. This check compares the recursive key set of each pair
      # and fails on any drift.
      - name: Claude settings + Codex hooks pairs must have identical key sets
        run: |
          python3 - <<'PY'
          import json, sys

          def key_paths(node, prefix=""):
              if isinstance(node, dict):
                  for k, v in node.items():
                      p = f"{prefix}.{k}" if prefix else k
                      yield p
                      yield from key_paths(v, p)
              elif isinstance(node, list):
                  # Use a stable index-agnostic marker so an array's items
                  # don't have to be ordered identically between the two
                  # variants. Within an item the recursive keys still match.
                  for item in node:
                      yield from key_paths(item, f"{prefix}[]")

          pairs = [
              ("tooling/claude/settings.json", "tooling/claude/settings.windows.json"),
              ("tooling/codex/hooks.json",     "tooling/codex/hooks.windows.json"),
          ]

          errs = []
          for posix, windows in pairs:
              with open(posix) as f:    p_keys = set(key_paths(json.load(f)))
              with open(windows) as f:  w_keys = set(key_paths(json.load(f)))
              only_posix   = sorted(p_keys - w_keys)
              only_windows = sorted(w_keys - p_keys)
              if only_posix or only_windows:
                  errs.append(f"\n{posix}  vs  {windows}")
                  if only_posix:
                      errs.append(f"  in POSIX only:   {only_posix}")
                  if only_windows:
                      errs.append(f"  in Windows only: {only_windows}")
              else:
                  print(f"OK: {posix}  <->  {windows}  ({len(p_keys)} keys)")

          if errs:
              print("\nKEY-SET DIVERGENCE between platform variants:")
              for e in errs: print(e)
              print("\nA key added on one side must be added on the other — "
                    "otherwise one platform silently loses a hook / setting.")
              sys.exit(1)
          PY
