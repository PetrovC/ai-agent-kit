name: PR - versioning + release hygiene

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dogfood-install-policy:
    name: Claude/Codex/Gemini dogfood install policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Only intended root AI config may be tracked
        run: |
          # This repository intentionally dogfoods its own Claude + Codex +
          # Gemini installation so agents can use the kit while maintaining
          # the kit. That means AGENTS.md, CLAUDE.md, GEMINI.md,
          # .agents/, .claude/, .codex/, .gemini/, .geminiignore,
          # .mcp.json, .mcp.example.jsonc, .kit-version, .kit-manifest, and
          # docs/ai/ may be tracked here on purpose.
          #
          # Still forbidden: local/runtime Claude files that are
          # machine/session-specific.
          bad=0
          for p in CLAUDE.local.md \
                   .claude/settings.local.json .claude/session-log \
                   .claude/worktrees; do
            if git ls-files --error-unmatch "$p" >/dev/null 2>&1; then
              echo "TRACKED FORBIDDEN AI CONFIG/RUNTIME FILE: $p"
              bad=1
            fi
            # Also catch a tracked directory's contents.
            if git ls-files "$p/" 2>/dev/null | grep -q .; then
              echo "TRACKED FORBIDDEN AI CONFIG/RUNTIME DIR: $p/"
              bad=1
            fi
          done

          for p in .kit-version .kit-manifest .mcp.json AGENTS.md CLAUDE.md \
                   GEMINI.md .geminiignore \
                   .codex/config.toml .codex/hooks.json .claude/settings.json \
                   .gemini/settings.json \
                   docs/ai/PROJECT.md; do
            if ! git ls-files --error-unmatch "$p" >/dev/null 2>&1; then
              echo "MISSING TRACKED DOGFOOD FILE: $p"
              bad=1
            fi
          done

          if [[ -f .kit-manifest ]]; then
            while IFS= read -r p; do
              [[ -n "$p" ]] || continue
              if ! git ls-files --error-unmatch "$p" >/dev/null 2>&1; then
                echo "MANIFEST ENTRY NOT TRACKED: $p"
                bad=1
              fi
            done < .kit-manifest
          else
            echo "MISSING .kit-manifest"
            bad=1
          fi

          # Reverse manifest check (audit T1): every tracked file under the
          # dogfood roots must appear in .kit-manifest. Catches orphans
          # added to .claude/, .codex/, .agents/, .gemini/ without updating
          # the manifest — same class of bug as a dogfood-only PR that
          # bypasses the source/install pipeline.
          if [[ -f .kit-manifest ]]; then
            while IFS= read -r p; do
              [[ -n "$p" ]] || continue
              if ! grep -qxF "$p" .kit-manifest; then
                echo "ORPHAN dogfood file (not in .kit-manifest): $p"
                bad=1
              fi
            done < <(git ls-files .claude .codex .agents .gemini)
          fi

          [[ "$bad" -eq 0 ]] || { echo "Claude/Codex/Gemini dogfood install policy failed."; exit 1; }
          echo "OK: Claude/Codex/Gemini dogfood install tracked; runtime outputs excluded; no manifest orphans"

  lint-plugin-manifest:
    name: Claude plugin + marketplace manifests valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: plugin.json and marketplace.json must be valid and consistent
        run: |
          python3 - <<'PY'
          import json, re, sys
          errs = []

          with open(".claude-plugin/plugin.json") as f:
              p = json.load(f)
          for k in ("name", "version", "description"):
              if not p.get(k):
                  errs.append(f"plugin.json missing '{k}'")

          with open(".claude-plugin/marketplace.json") as f:
              m = json.load(f)
          if not m.get("name"):
              errs.append("marketplace.json missing 'name'")
          if not m.get("owner", {}).get("name"):
              errs.append("marketplace.json missing 'owner.name'")
          plugins = m.get("plugins") or []
          if not plugins:
              errs.append("marketplace.json has no plugins")
          for pl in plugins:
              if not pl.get("name") or not pl.get("source"):
                  errs.append(f"marketplace plugin entry missing name/source: {pl}")

          # VERSION is the root source of truth. Manifests and lifecycle
          # scripts must read it rather than carrying their own hardcoded
          # release number.
          try:
              with open("VERSION", encoding="utf-8") as f:
                  kit_ver = f.read().replace("\r", "")
              if kit_ver.endswith("\n"):
                  kit_ver = kit_ver[:-1]
          except FileNotFoundError:
              kit_ver = None
              errs.append("VERSION file missing")
          if kit_ver and not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", kit_ver):
              errs.append(f"VERSION must contain semver only, got {kit_ver!r}")

          if kit_ver != p.get("version"):
              errs.append(f"plugin.json version ({p.get('version')}) != VERSION ({kit_ver})")

          with open("tooling/gemini/gemini-extension.json") as f:
              ext = json.load(f)
          if kit_ver != ext.get("version"):
              errs.append(f"gemini-extension.json version ({ext.get('version')}) != VERSION ({kit_ver})")

          # .kit-version is the dogfood install state file written by
          # install.sh / update.sh. In this source repo it is tracked, and
          # its `@<version>` segment is expected to match the root VERSION
          # — otherwise a fresh clone sees a stale dogfood that does not
          # advertise the current release. Format produced by install/update:
          #   ai-agent-kit@<VERSION> - <installed|updated> <DATE> - tools: <tools>
          import os
          if os.path.exists(".kit-version"):
              with open(".kit-version", encoding="utf-8") as f:
                  kv = f.read().replace("\r", "").strip()
              m = re.match(r"^ai-agent-kit@([0-9]+\.[0-9]+\.[0-9]+)\b", kv)
              if not m:
                  errs.append(f".kit-version has unexpected format: {kv!r}")
              elif m.group(1) != kit_ver:
                  errs.append(
                      f".kit-version @{m.group(1)} != VERSION {kit_ver} — "
                      "run `scripts/update.sh --target . --tools codex,claude,gemini` "
                      "to refresh the dogfood install state file")

          hardcoded = re.compile(
              r'(?:KIT_VERSION|\$KitVersion)\s*=\s*["\'][0-9]+\.[0-9]+\.[0-9]+["\']')
          expected_reads = {
              "scripts/install.sh": 'VERSION_FILE="$KIT_ROOT/VERSION"',
              "scripts/update.sh": 'VERSION_FILE="$KIT_ROOT/VERSION"',
              "scripts/install.ps1": 'Join-Path $KitRoot "VERSION"',
              "scripts/update.ps1": 'Join-Path $KitRoot "VERSION"',
          }
          for script, expected in expected_reads.items():
              with open(script, encoding="utf-8") as f:
                  script_txt = f.read()
              if expected not in script_txt:
                  errs.append(f"{script} does not read root VERSION")
              if hardcoded.search(script_txt):
                  errs.append(f"{script} still defines a hardcoded kit version")

          # marketplace plugin source must be a documented form: a relative
          # path starting with "./", or a {source: github|url|...} object.
          self_repo = (p.get("repository") or "").replace("https://github.com/", "").rstrip("/")
          for pl in plugins:
              src = pl.get("source")
              ok = (isinstance(src, str) and src.startswith("./")) or (
                  isinstance(src, dict) and src.get("source") in ("github", "url", "git-subdir", "npm")
              )
              if not ok:
                  errs.append(f"marketplace source not a documented form: {src!r}")
              # Same-repo plugins MUST use the relative "./..." form. A
              # {source:github, repo:<own repo>} self-reference forces a second
              # fetch that breaks on private repos.
              if isinstance(src, dict) and src.get("source") == "github" \
                 and src.get("repo", "").rstrip("/") == self_repo and self_repo:
                  errs.append(
                      f"plugin source github:{src.get('repo')} self-references the "
                      f"marketplace repo; use a relative \"./\" source instead "
                      f"(private-repo safe, no second fetch)")

          if errs:
              print("\n".join(errs)); sys.exit(1)
          print(f"OK: manifests valid + VERSION-consistent ({kit_ver})")
          PY

  lint-changelog:
    name: CHANGELOG.md release metadata valid
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: CHANGELOG.md invariants (one [Unreleased], no duplicate versions, valid heading format)
        run: |
          python3 - <<'PY'
          import re, sys
          errs = []

          try:
              with open("CHANGELOG.md", encoding="utf-8") as f:
                  changelog = f.read()
          except FileNotFoundError:
              print("CHANGELOG.md missing"); sys.exit(1)

          # Exactly one [Unreleased] section
          unreleased = re.findall(r"^## \[Unreleased\]", changelog, re.MULTILINE)
          if not unreleased:
              errs.append("CHANGELOG.md: no [Unreleased] section")
          elif len(unreleased) > 1:
              errs.append(f"CHANGELOG.md: {len(unreleased)} [Unreleased] sections (expected exactly 1)")

          # No duplicate version section headings (full version including pre-release suffix)
          versions = re.findall(r"^## \[(\d+\.\d+\.\d+(?:-[A-Za-z0-9.]+)?)\]", changelog, re.MULTILINE)
          seen: set = set()
          for v in versions:
              if v in seen:
                  errs.append(f"CHANGELOG.md: duplicate version section [{v}]")
              seen.add(v)

          # All version headings must use valid format:
          #   ## [X.Y.Z] or ## [X.Y.Z-pre] or ## [X.Y.Z] - YYYY-MM-DD or ## [X.Y.Z-pre] - YYYY-MM-DD
          for h in re.findall(r"^## \[.+$", changelog, re.MULTILINE):
              h = h.rstrip()
              if re.match(r"^## \[Unreleased\]", h):
                  continue
              if not re.match(r"^## \[\d+\.\d+\.\d+(?:-[A-Za-z0-9.]+)?\]( - \d{4}-\d{2}-\d{2})?$", h):
                  errs.append(f"CHANGELOG.md: invalid heading format: {h!r}")

          if errs:
              print("\n".join(errs)); sys.exit(1)
          print(f"OK: CHANGELOG.md — {len(unreleased)} [Unreleased] section, "
                f"{len(seen)} release section(s), headings valid")
          PY
