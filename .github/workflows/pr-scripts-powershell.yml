name: PR — scripts (powershell)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  smoke-install-windows:
    name: Smoke install (PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Pester suite
        shell: powershell
        run: Invoke-Pester tests/pester/

      - name: Install kit into temp project
        shell: pwsh
        run: |
          $target = "$env:RUNNER_TEMP\smoke-target"
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          .\scripts\install.ps1 -Target $target -Tools "codex,claude,agy"

      - name: Verify expected files exist
        shell: pwsh
        run: |
          $target = "$env:RUNNER_TEMP\smoke-target"
          $files = @(
            "AGENTS.md", "CLAUDE.md", "AGY.md", ".kit-version", ".mcp.json", ".mcp.example.jsonc",
            ".claude\settings.json",
            ".claude\hooks\format-on-save.sh", ".claude\hooks\pre-bash-guard.sh",
            ".claude\hooks\notify-done.sh", ".claude\hooks\session-summary.sh",
            ".claude\hooks\run-hook.ps1",
            ".claude\rules\test-naming.md",
            ".claude\rules\migration-safety.md", ".claude\rules\env-safety.md",
            ".claude\commands\bug-fix.md", ".claude\commands\code-review.md",
            ".claude\commands\feature-planning.md",
            ".codex\config.toml", ".codex\hooks.json",
            ".codex\hooks\pre-bash-guard.sh", ".codex\hooks\format-on-save.sh",
            ".codex\hooks\notify-done.sh", ".codex\hooks\run-hook.ps1",
            ".codex\hooks\permission-request-log.sh", ".codex\hooks\session-start-summary.sh",
            ".agents\skills\architect\SKILL.md", ".agents\skills\security-reviewer\SKILL.md",
            ".agy\commands\bug-fix.toml", ".agy\commands\security-audit.toml",
            "docs\ai\PROJECT.md"
          )
          $missing = $false
          foreach ($f in $files) {
            $path = Join-Path $target $f
            if (Test-Path $path) { Write-Host "OK: $f" }
            else { Write-Host "MISSING: $f"; $missing = $true }
          }
          if ($missing) { exit 1 }

      - name: Update --dry-run reports up-to-date right after install (audit T3)
        shell: pwsh
        run: |
          # Mirror of the bash e2e-lifecycle "Real update is a no-op right
          # after install" assertion. Catches a class of bugs where
          # install.ps1 copies a file that update.ps1 doesn't recognise as
          # its own — they would diverge silently and every dry-run after
          # install would print pending changes the user must approve.
          $out = .\scripts\update.ps1 -Target "$env:RUNNER_TEMP\smoke-target" -DryRun *>&1 | Out-String
          Write-Host $out
          if ($out -notmatch "Everything is up to date") {
            Write-Host "FAIL: update.ps1 -DryRun reported pending changes right after install"
            exit 1
          }
          Write-Host "OK: update.ps1 -DryRun is a no-op right after install"

      - name: update.ps1 preserves unknown legacy Codex agent files
        shell: pwsh
        run: |
          $target = Join-Path $env:RUNNER_TEMP "legacy-codex-$([guid]::NewGuid())"
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          .\scripts\install.ps1 -Target $target -Tools "codex" | Out-Null
          $legacyDir = Join-Path $target ".codex\agents"
          New-Item -ItemType Directory -Path $legacyDir -Force | Out-Null
          $unknown = Join-Path $legacyDir "architect.toml"
          Set-Content -LiteralPath $unknown -Value "project-owned"

          $dry = .\scripts\update.ps1 -Target $target -Tools "codex" -DryRun *>&1 | Out-String
          if ($dry -notmatch "SKIPPED  \.codex/agents/architect\.toml \(legacy; ownership unknown\)") {
            Write-Host "FAIL: unknown legacy file was not reported as skipped"
            Write-Host $dry
            exit 1
          }

          .\scripts\update.ps1 -Target $target -Tools "codex" | Out-Null
          if (-not (Test-Path -LiteralPath $unknown)) {
            Write-Host "FAIL: update.ps1 deleted a project-owned legacy agent"
            exit 1
          }

          $target2 = Join-Path $env:RUNNER_TEMP "legacy-codex-owned-$([guid]::NewGuid())"
          New-Item -ItemType Directory -Path $target2 -Force | Out-Null
          .\scripts\install.ps1 -Target $target2 -Tools "codex" | Out-Null
          $legacyDir2 = Join-Path $target2 ".codex\agents"
          New-Item -ItemType Directory -Path $legacyDir2 -Force | Out-Null
          $owned = Join-Path $legacyDir2 "code-reviewer.toml"
          Set-Content -LiteralPath $owned -Value "kit-owned"
          Add-Content -LiteralPath (Join-Path $target2 ".kit-manifest") -Value ".codex/agents/code-reviewer.toml"

          $out = .\scripts\update.ps1 -Target $target2 -Tools "codex" *>&1 | Out-String
          if ($out -notmatch "PRUNED   \.codex/agents/code-reviewer\.toml") {
            Write-Host "FAIL: manifest-owned legacy file was not pruned"
            Write-Host $out
            exit 1
          }
          if (Test-Path -LiteralPath $owned) {
            Write-Host "FAIL: manifest-owned legacy file survived"
            exit 1
          }
          Write-Host "OK: update.ps1 gates legacy Codex cleanup on manifest ownership"

      - name: install.ps1 wrote .kit-manifest (parity with install.sh)
        shell: pwsh
        run: |
          $m = Join-Path "$env:RUNNER_TEMP\smoke-target" ".kit-manifest"
          if (-not (Test-Path $m)) { Write-Host "FAIL: .kit-manifest missing"; exit 1 }
          $lines = Get-Content $m
          if ($lines.Count -lt 50) {
            Write-Host "FAIL: .kit-manifest looks empty / under-populated ($($lines.Count) lines)"; exit 1
          }
          # No BOM at the start (bash sort/grep would otherwise see it). Read
          # raw bytes — Get-Content auto-strips BOM, so a string check would
          # never fail even with a BOM present.
          $bytes = [System.IO.File]::ReadAllBytes($m)
          if ($bytes.Count -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) {
            Write-Host "FAIL: .kit-manifest starts with UTF-8 BOM"; exit 1
          }
          # No backslashes — manifest paths must be forward-slashed for
          # cross-shell readability (bash update.sh on Git-Bash on the same project).
          if ($lines | Where-Object { $_ -match '\\' }) {
            Write-Host "FAIL: .kit-manifest has backslash paths"; exit 1
          }
          Write-Host "OK: .kit-manifest ($($lines.Count) entries, no BOM, forward-slashed)"

      - name: install/update/uninstall.ps1 preserve project-owned .mcp.json
        shell: pwsh
        run: |
          $target = Join-Path $env:RUNNER_TEMP "mcp-owned-$([guid]::NewGuid())"
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          .\scripts\install.ps1 -Target $target -Tools "claude" | Out-Null

          # Configure a real MCP server (mirrors the README copy/paste flow).
          $configured = @"
          {
            "mcpServers": {
              "github": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-github"],
                "env": { "GITHUB_TOKEN": "`${GITHUB_TOKEN}" }
              }
            }
          }
          "@
          $mcp = Join-Path $target ".mcp.json"
          Set-Content -LiteralPath $mcp -Value $configured -NoNewline
          $hash = (Get-FileHash -LiteralPath $mcp -Algorithm SHA256).Hash

          # 1. Re-running install must NOT overwrite.
          $out = .\scripts\install.ps1 -Target $target -Tools "claude" *>&1 | Out-String
          if ($out -notmatch "\[skip\] \.mcp\.json") {
            Write-Host "FAIL: install did not skip existing .mcp.json"; Write-Host $out; exit 1
          }
          if ((Get-FileHash -LiteralPath $mcp -Algorithm SHA256).Hash -ne $hash) {
            Write-Host "FAIL: install overwrote project-owned .mcp.json"; exit 1
          }

          # 2. update must NOT touch .mcp.json. .mcp.example.jsonc is still refreshed.
          Remove-Item -LiteralPath (Join-Path $target ".mcp.example.jsonc") -Force
          $out = .\scripts\update.ps1 -Target $target -Tools "claude" *>&1 | Out-String
          if ((Get-FileHash -LiteralPath $mcp -Algorithm SHA256).Hash -ne $hash) {
            Write-Host "FAIL: update overwrote project-owned .mcp.json"; exit 1
          }
          if (-not (Test-Path -LiteralPath (Join-Path $target ".mcp.example.jsonc"))) {
            Write-Host "FAIL: update did not restore .mcp.example.jsonc"; exit 1
          }
          if ($out -notmatch "NEW      \.mcp\.example\.jsonc") {
            Write-Host "FAIL: update did not report .mcp.example.jsonc as NEW"; Write-Host $out; exit 1
          }
          if ($out -match "\.mcp\.json") {
            Write-Host "FAIL: update mentioned .mcp.json"; Write-Host $out; exit 1
          }

          # 3. Manifest must not track .mcp.json.
          $manifest = Get-Content -LiteralPath (Join-Path $target ".kit-manifest")
          if ($manifest -contains ".mcp.json") {
            Write-Host "FAIL: .mcp.json appears in .kit-manifest"; exit 1
          }

          # 4. uninstall must preserve .mcp.json (project-owned, like docs/ai/).
          .\scripts\uninstall.ps1 -Target $target -Tools "claude" | Out-Null
          if (-not (Test-Path -LiteralPath $mcp)) {
            Write-Host "FAIL: uninstall removed project-owned .mcp.json"; exit 1
          }
          if ((Get-FileHash -LiteralPath $mcp -Algorithm SHA256).Hash -ne $hash) {
            Write-Host "FAIL: uninstall mutated .mcp.json"; exit 1
          }
          if (Test-Path -LiteralPath (Join-Path $target ".mcp.example.jsonc")) {
            Write-Host "FAIL: uninstall left kit-owned .mcp.example.jsonc"; exit 1
          }
          Write-Host "OK: .mcp.json survives install reruns, update, and uninstall (PS)"

      - name: Dry-run uninstall
        shell: pwsh
        run: .\scripts\uninstall.ps1 -Target "$env:RUNNER_TEMP\smoke-target" -DryRun

      - name: install/update/uninstall.ps1 reject missing and non-directory Target
        shell: pwsh
        run: |
          # Parity with the bash side: [[ ! -d "$TARGET" ]] refuses both a
          # missing path and a regular file. Without -PathType Container,
          # PowerShell silently accepted a file (typo or wrong arg) and the
          # subsequent Join-Path / New-Item -ItemType Directory calls began
          # materializing a pseudo-install under that invalid root. Regression
          # coverage for #67 — must fail-fast on each PS lifecycle script.
          $fail = 0
          $missing = "$env:RUNNER_TEMP\does-not-exist-$([guid]::NewGuid())"
          $file    = New-Item -ItemType File -Path "$env:RUNNER_TEMP\not-a-dir-$([guid]::NewGuid())" -Force | Select-Object -ExpandProperty FullName
          foreach ($case in @(
            @{ Script = "scripts\install.ps1";   Args = @("-Target", $missing, "-Tools", "claude"); Label = "install / missing" },
            @{ Script = "scripts\install.ps1";   Args = @("-Target", $file,    "-Tools", "claude"); Label = "install / file" },
            @{ Script = "scripts\update.ps1";    Args = @("-Target", $missing, "-Tools", "claude"); Label = "update / missing" },
            @{ Script = "scripts\update.ps1";    Args = @("-Target", $file,    "-Tools", "claude"); Label = "update / file" },
            @{ Script = "scripts\uninstall.ps1"; Args = @("-Target", $missing);                     Label = "uninstall / missing" },
            @{ Script = "scripts\uninstall.ps1"; Args = @("-Target", $file);                        Label = "uninstall / file" }
          )) {
            $out = & pwsh -NoProfile -ExecutionPolicy Bypass -File $case.Script @($case.Args) 2>&1
            $rc = $LASTEXITCODE
            if ($rc -ne 0 -and ($out -join "`n") -match "Target directory does not exist") {
              Write-Host "PASS $($case.Label) (rc=$rc)"
            } else {
              Write-Host "FAIL $($case.Label) (rc=$rc): $($out | Select-Object -Last 1)"
              $fail = 1
            }
          }
          Remove-Item -LiteralPath $file -Force
          # Explicit exit 0 — without it, $LASTEXITCODE leaks the rc=1 from
          # the last `& pwsh ...` invocation above and the step still fails
          # despite every case passing.
          if ($fail) { exit 1 } else { exit 0 }

      - name: new-skill.ps1 interpolates $Name without $$<name> corruption
        shell: pwsh
        run: |
          # Closes #69 (PS-side only): the prior `` "...`$`$Name``..." `` form
          # double-escaped the `$` and wrote `$$Name` literally into AGENTS.md
          # instead of interpolating the skill slug. Scaffold a probe and
          # assert the AGENTS.md row contains a single literal `$` followed by
          # the slug, never `$$<slug>`. The slug-validation / reserved-name
          # rejects (#96) are covered by the bash workflow against the
          # identical regex and reserved-name list — replicating them here
          # would not catch a Bash-vs-PS divergence the parser already catches
          # via the syntax check + PSScriptAnalyzer job.
          $ErrorActionPreference = 'Continue'
          $probe = "ps-probe-$([guid]::NewGuid().ToString('N').Substring(0,6))"
          Write-Host "Probe slug: $probe"

          # Run new-skill.ps1 in a subshell so any `exit N` it emits (e.g. the
          # partial-routing safeguard) terminates the subshell only, not this
          # step. Capture all output for diagnostics regardless of exit code.
          $scaffoldOut = & pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/new-skill.ps1 -Name $probe -Description "PS probe." 2>&1
          $rc = $LASTEXITCODE
          Write-Host "--- new-skill.ps1 (rc=$rc) ---"
          Write-Host ($scaffoldOut | Out-String)
          Write-Host "--- end ---"

          $fail = 0
          if ($rc -ne 0) {
            Write-Host "FAIL: new-skill.ps1 exit=$rc"
            $fail = 1
          } else {
            $agents = Get-Content -Raw -LiteralPath "tooling/codex/AGENTS.md"
            $matchedLine = ($agents -split "`n" | Where-Object { $_ -match [regex]::Escape($probe) }) -join " | "
            Write-Host "AGENTS.md probe row: $matchedLine"

            if ($agents -notmatch [regex]::Escape("`$$probe")) {
              Write-Host "FAIL: AGENTS.md missing single-`$ row for $probe"
              $fail = 1
            }
            if ($agents -match [regex]::Escape("`$`$$probe")) {
              Write-Host "FAIL: AGENTS.md contains `$`$<name> corruption (issue #69 regression)"
              $fail = 1
            }
          }

          # Clean up probe + restore routing-table mutations so subsequent
          # steps see a pristine working tree.
          Remove-Item -LiteralPath "skills/$probe" -Recurse -Force -ErrorAction SilentlyContinue
          git checkout -- tooling/claude/CLAUDE.md tooling/codex/AGENTS.md tooling/agy/AGY.md 2>$null

          if ($fail) { exit 1 } else { Write-Host "OK: PS scaffolds with correct single-`$ AGENTS.md row"; exit 0 }

      - name: install/update/uninstall.ps1 handle paths with wildcard chars (`[`, `]`) literally
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $fail = 0

          # Closes #89: a target path containing `[`/`]` (common in client
          # folders like `C:\work\[acme]\app`) must be treated as a literal
          # filesystem path. PowerShell's bare `-Path` parameter expands
          # wildcards, so `Test-Path "C:\…\[acme]\…"` returns $false even
          # when the directory exists. Every Test-Path / Copy-Item /
          # Remove-Item / Get-ChildItem / Get-Content on a $Target-derived
          # path now uses -LiteralPath; this step exercises a real install
          # against a bracketed path to catch regressions end-to-end.
          #
          # Run each lifecycle script via `& pwsh -File` so any `exit N`
          # inside the script (e.g. validation) terminates the subshell
          # only, not this outer step. Same pattern as the new-skill.ps1
          # test below.
          $bracket = Join-Path $env:RUNNER_TEMP "lit-[acme]-$([guid]::NewGuid().ToString('N').Substring(0,6))"
          [System.IO.Directory]::CreateDirectory($bracket) | Out-Null

          $out = & pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/install.ps1 -Target $bracket -Tools "claude" 2>&1
          $rc = $LASTEXITCODE
          if ($rc -ne 0) {
            Write-Host "FAIL: install rejected bracketed target (rc=$rc)"
            Write-Host ($out | Out-String); $fail = 1
          } else {
            foreach ($rel in @("CLAUDE.md", ".kit-version", ".kit-manifest", ".claude/settings.json", ".claude/hooks/pre-bash-guard.sh")) {
              if (-not (Test-Path -LiteralPath (Join-Path $bracket $rel))) {
                Write-Host "FAIL: install bracketed target left $rel missing"; $fail = 1
              }
            }
          }

          if ($fail -eq 0) {
            $out = & pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/update.ps1 -Target $bracket 2>&1 | Out-String
            $rc = $LASTEXITCODE
            if ($rc -ne 0) {
              Write-Host "FAIL: update rejected bracketed target (rc=$rc)"; Write-Host $out; $fail = 1
            } elseif ($out -notmatch "Everything is up to date") {
              Write-Host "FAIL: update wasn't a no-op right after install on bracketed target"
              Write-Host $out; $fail = 1
            }
          }

          if ($fail -eq 0) {
            & pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/uninstall.ps1 -Target $bracket 2>&1 | Out-Null
            $rc = $LASTEXITCODE
            if ($rc -ne 0) {
              Write-Host "FAIL: uninstall rejected bracketed target (rc=$rc)"; $fail = 1
            } else {
              foreach ($leftover in @(".kit-version", ".kit-manifest", "CLAUDE.md", ".claude")) {
                if (Test-Path -LiteralPath (Join-Path $bracket $leftover)) {
                  Write-Host "FAIL: uninstall bracketed target left $leftover behind"; $fail = 1
                }
              }
            }
          }

          Remove-Item -LiteralPath $bracket -Recurse -Force -ErrorAction SilentlyContinue
          if ($fail) { exit 1 } else { Write-Host "OK: PS lifecycle scripts treat ``[...]`` target paths literally"; exit 0 }

      - name: install.ps1 with -Target . prints accurate relative paths (no .Replace dot-strip)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $fail = 0
          # Closes #74: $dst.Replace($Target, "") used to collapse every
          # dot when $Target was ".", producing e.g. `codex/configtoml`
          # instead of `.codex/config.toml` in the [ok] / NEW / UPDATED
          # change lines. Run install with -Target . in a sandbox and
          # assert the printed paths keep their dots.
          $sandbox = Join-Path $env:RUNNER_TEMP "dot-target-$([guid]::NewGuid().ToString('N').Substring(0,6))"
          [System.IO.Directory]::CreateDirectory($sandbox) | Out-Null
          $repo = $env:GITHUB_WORKSPACE
          Push-Location -LiteralPath $sandbox
          try {
            $out = & pwsh -NoProfile -ExecutionPolicy Bypass -File (Join-Path $repo "scripts\install.ps1") -Target . -Tools "claude" 2>&1 | Out-String
            $rc = $LASTEXITCODE
            if ($rc -ne 0) {
              Write-Host "FAIL: install -Target . rejected (rc=$rc)"; Write-Host $out; $fail = 1
            } else {
              # Real paths the kit ships under `claude` always have dots:
              # `.claude/settings.json`, `.mcp.example.jsonc`, `CLAUDE.md`,
              # `.claude/hooks/pre-bash-guard.sh`. The bug stripped the
              # leading `.` AND the file-extension dot. Assert the real
              # forms appear in the install output.
              foreach ($expected in @(".claude/settings.json", ".claude/hooks/pre-bash-guard.sh", ".mcp.example.jsonc", "CLAUDE.md")) {
                if ($out -notmatch [regex]::Escape($expected)) {
                  Write-Host "FAIL: install output missing `"$expected`" — dot-strip regression?"
                  Write-Host $out; $fail = 1
                }
              }
              # And the bug's exact symptoms must NOT appear.
              foreach ($corrupt in @("codex/configtoml", "claude/settingsjson", "mcpexamplejsonc")) {
                if ($out -match [regex]::Escape($corrupt)) {
                  Write-Host "FAIL: install output contains corrupted path `"$corrupt`" (issue #74 regression)"
                  $fail = 1
                }
              }
            }
          } finally {
            Pop-Location
            Remove-Item -LiteralPath $sandbox -Recurse -Force -ErrorAction SilentlyContinue
          }
          if ($fail) { exit 1 } else { Write-Host "OK: install -Target . preserves dot-prefixed dirs and file extensions"; exit 0 }

      - name: Installed Claude / Codex hook command form runs through Windows wrapper
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          # Windows installs wire hooks through run-hook.ps1 so they prefer
          # Git Bash from Program Files instead of an ambiguous PATH `bash`
          # that may resolve to the WSL launcher stub. Execute the installed
          # command forms with a representative JSON payload on stdin to prove
          # the hooks actually fire (exit 0 or exit 2 = blocked, both are
          # "ran"; rc 127 / 126 / other = wrapper/bash resolution broken).
          $fail = 0

          $target = "$env:RUNNER_TEMP\smoke-target"
          if (-not (Test-Path -LiteralPath $target)) {
            Write-Host "FAIL: previous smoke-install step didn't leave $target — cannot exercise hook form"
            exit 1
          }
          $hookPath = Join-Path $target ".claude\hooks\pre-bash-guard.sh"
          if (-not (Test-Path -LiteralPath $hookPath)) {
            Write-Host "FAIL: installed hook not found at $hookPath"
            exit 1
          }

          $stdin = '{"tool_input":{"command":"echo hello"}}'

          $claudeSettings = Get-Content -LiteralPath (Join-Path $target ".claude\settings.json") -Raw | ConvertFrom-Json
          $claudeCmd = $claudeSettings.hooks.PreToolUse[0].hooks[0].command.Replace('${CLAUDE_PROJECT_DIR}', $target.Replace('\', '/'))

          $codexHooks = Get-Content -LiteralPath (Join-Path $target ".codex\hooks.json") -Raw | ConvertFrom-Json
          $codexCmd = $codexHooks.hooks.PreToolUse[0].hooks[0].command

          foreach ($case in @(
            @{ Name = "claude"; Command = $claudeCmd },
            @{ Name = "codex";  Command = $codexCmd }
          )) {
            Write-Host "--- $($case.Name) hook command ---"
            Write-Host $case.Command
            Push-Location $target
            try {
              $out = $stdin | & cmd /c $case.Command 2>&1
              $rc = $LASTEXITCODE
            } finally {
              Pop-Location
            }
            Write-Host "--- $($case.Name) hook output (rc=$rc) ---"
            Write-Host ($out | Out-String)

            if ($rc -ne 0 -and $rc -ne 2) {
              Write-Host "FAIL: $($case.Name) hook command form failed with unexpected rc=$rc (0=allow, 2=block, anything else = wrapper/bash broken)"
              $fail = 1
            }
          }

          if ($fail) { exit 1 } else { Write-Host "OK: installed hook command forms run through Windows wrapper"; exit 0 }

      - name: All .ps1 scripts must parse (syntax)
        shell: pwsh
        run: |
          $bad = $false
          Get-ChildItem scripts\*.ps1, tooling\claude\hooks\*.ps1, tooling\codex\hooks\*.ps1 | ForEach-Object {
            $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errs) | Out-Null
            if ($errs) { Write-Host "PARSE ERROR: $($_.Name)"; $errs | ForEach-Object { Write-Host "  $_" }; $bad = $true }
            else { Write-Host "OK: $($_.Name)" }
          }
          if ($bad) { exit 1 }
