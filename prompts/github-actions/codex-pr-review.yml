# Codex — Automated PR review workflow
#
# Runs Codex to review pull requests on @codex mentions and posts the result
# back as a PR comment.
# Copy to .github/workflows/codex-pr-review.yml in your project.
#
# SETUP:
#   1. Add OPENAI_API_KEY as a repository secret.
#   2. Ensure the workflow has write access to pull requests.
#
# USAGE:
#   Comment "@codex review" on any PR to trigger a code review.
#   Codex reads AGENTS.md and the relevant skill from .agents/skills/.
#
# DOCS: https://github.com/openai/codex-action

name: Codex PR Review

on:
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  codex-review:
    name: Codex code review
    runs-on: ubuntu-latest
    # `github.event.issue.pull_request` only exists on issue_comment events.
    # pull_request_review_comment events are always on a PR, so accept them
    # directly. Without this split the review-comment trigger never fires.
    if: |
      contains(github.event.comment.body, '@codex') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      (
        (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
        github.event_name == 'pull_request_review_comment'
      )

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Review the changes in this pull request.
            Focus on: correctness, security, regressions, missing tests, architecture compliance.
            Read AGENTS.md and docs/ai/ARCHITECTURE.md before reviewing.
            Format your output with sections: Blockers, Important, Minor.
          # Pin a model explicitly. See https://developers.openai.com/codex for the current list.
          # Omit to use the action's default.
          # model: "gpt-5-codex"

          # Read-only sandbox is the safe default for review jobs (no writes, no network).
          sandbox: "read-only"

          # safety-strategy controls how much access Codex gets on the runner.
          # Valid: "drop-sudo" | "unprivileged-user" | "read-only" | "unsafe".
          # "read-only" is the safe choice for review-only workflows.
          safety-strategy: "read-only"

      - name: Post review as PR comment
        if: always() && steps.codex.outputs.final-message != ''
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
        with:
          script: |
            const prNumber = context.eventName === 'pull_request_review_comment'
              ? context.payload.pull_request.number
              : context.payload.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
