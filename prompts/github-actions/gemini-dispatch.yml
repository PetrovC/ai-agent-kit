# Gemini CLI — Dispatch router
#
# Central entry point for @gemini-cli comment commands. Routes:
#   @gemini-cli /review   -> code review
#   @gemini-cli /triage   -> issue triage
#   @gemini-cli <text>    -> general assistant
# Copy to .github/workflows/gemini-dispatch.yml in your project.
#
# SETUP (default — API key, one secret):
#   1. Add GEMINI_API_KEY as a repository secret.
#   2. Grant the workflow write access to issues and pull requests.
#
# SETUP (alternative — WIF, keyless):
#   Uncomment the auth step + use_vertex_ai, add the GCP secrets,
#   uncomment id-token: write, and drop gemini_api_key.
#
# DOCS: https://github.com/google-github-actions/run-gemini-cli

name: Gemini Dispatch

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  dispatch:
    name: Route @gemini-cli command
    runs-on: ubuntu-latest
    # Only repo insiders may trigger the agent — without this any
    # commenter could invoke it (cost + prompt-injection abuse vector).
    if: |
      contains(github.event.comment.body, '@gemini-cli') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)

    permissions:
      contents: read
      issues: write
      pull-requests: write
      # id-token: write   # uncomment for the WIF alternative below

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- WIF alternative (keyless). Uncomment + use_vertex_ai below,
      #     remove gemini_api_key, to use Workload Identity. ---
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      #     service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run Gemini dispatch
        uses: google-github-actions/run-gemini-cli@v0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # WIF alternative: remove gemini_api_key above and set:
          # use_vertex_ai: true
          gemini_cli_version: "latest"
          # gemini_debug: false
          # upload_artifacts: false
          prompt: |
            You are the dispatch router for this repository. Read GEMINI.md first.

            The triggering comment was:
            ${{ github.event.comment.body }}

            Routing rules:
            - If it contains "/review": review the PR diff for correctness,
              security, regressions, and missing tests. Output sections:
              Blockers, Important, Minor.
            - If it contains "/triage": classify the issue (bug/feature/
              question/docs), set priority, name the affected area, suggest a
              next step.
            - Otherwise: treat the remaining text as a direct request and
              answer it using the repo context and the relevant skill.

            Be concise and actionable. Post your answer as a comment.
