description = "Behaviour-preserving refactor with tests staying green."

prompt = """
Refactor: {{args}}

Rules:
- Do not change observable behavior. This is a refactor, not a feature.
- Keep the change small and reviewable. Prefer multiple small PRs over one rewrite.
- Do not introduce new patterns, abstractions, or dependencies unless requested.
- Maintain or improve test coverage.

Before editing:
- Use the @codebase-investigator subagent to map all affected usages.
- Identify the minimal scope of the refactor.
- Write a short plan before starting.

After editing:
- Run all existing tests. They must all pass.
- If a test needed updating, explain why (behavior-preserving adaptation vs change).
- Use the @code-reviewer subagent before final response.

Report: what changed and why, files changed, test results, risks.
"""
