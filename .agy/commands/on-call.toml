description = "Live-incident playbook: triage, narrow, root-cause, mitigate, write up."

prompt = """
We have a live incident. Read .agy/skills/observability/SKILL.md first.

Symptoms: {{args}}

── Step 1: Triage (5 minutes max) ──────────────────────────────────────────
- Complete outage or partial/degraded?
- What % of users or requests affected?
- Impact growing, stable, or recovering?
- What changed in the last 2 hours? (deploys, config, traffic, upstream)
If a quick rollback or feature flag can stop the bleeding: do it first.

── Step 2: Narrow the scope ─────────────────────────────────────────────────
- Error rate (last 1h) vs baseline (same window yesterday).
- Per-service / per-endpoint breakdown.
- Infra signals: DB pool, cache hit rate, queue depth, CPU/memory.
- Downstream dependencies degraded?

── Step 3: Identify root cause ──────────────────────────────────────────────
- Read recent error traces — find the first failure, not a cascade symptom.
- Cross-reference deploy history.
- Local to one pod/region or systemic?

── Step 4: Mitigate ─────────────────────────────────────────────────────────
Smallest effective mitigation first: rollback, scale, feature flag, circuit breaker.
Do not refactor under pressure. Restore first.

── Step 5: Post-incident write-up ───────────────────────────────────────────
Timeline, root cause (one sentence), impact, fix applied, follow-up tickets
(permanent fix, monitoring gap, test gap).
"""
